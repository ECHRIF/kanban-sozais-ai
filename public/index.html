          {catCriteria.map(c => (

              <span style={{ color:TXT2,fontSize:11,flex:1 }}>{c.label}</span>

// ─── KPI : Modal Gestion des critères (admin) ─────────────────
function KPIManageModal({ criteria, onClose, onRefresh }) {
  const [list, setList] = useState(criteria);
  const [newLabel, setNewLabel] = useState("");
  const [newCat, setNewCat] = useState("Personnalisé");
  const [saving, setSaving] = useState(false);

  const categories = [...new Set(criteria.map(c=>c.category))];

  const toggleActive = async (c) => {
    const updated = list.map(x=>x.id===c.id?{...x,active:x.active?0:1}:x);
    setList(updated);
    await authFetch(`/api/kpi/criteria/${c.id}`,{ method:"PATCH",body:JSON.stringify({active:!c.active}) });
  };

  const deleteCriteria = async (c) => {
    if(!window.confirm(`Supprimer "${c.label}" ?`)) return;
    setList(l=>l.filter(x=>x.id!==c.id));
    await authFetch(`/api/kpi/criteria/${c.id}`,{ method:"DELETE" });
  };

  const addCriteria = async () => {
    if(!newLabel.trim()) return;
    setSaving(true);
    const r = await authFetch("/api/kpi/criteria",{ method:"POST",body:JSON.stringify({label:newLabel.trim(),category:newCat}) });
    const d = await r.json();
    if(d.ok) { setList(l=>[...l,{id:d.id,label:newLabel.trim(),category:newCat,active:1,position:l.length+1}]); setNewLabel(""); }
    setSaving(false);
  };

  return (
    <div onClick={onClose} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:DARK2,border:"1px solid "+BRD,borderRadius:16,padding:28,width:"100%",maxWidth:620,maxHeight:"90vh",overflowY:"auto" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
          <h2 style={{ color:TXT,fontSize:18,fontWeight:700,margin:0 }}>⚙️ Gérer les critères KPI</h2>
          <button onClick={()=>{onRefresh();onClose();}} style={{ background:"none",border:"none",color:TXT3,fontSize:22,cursor:"pointer" }}>✕</button>
        </div>
        {/* Ajouter un critère */}
        <div style={{ padding:"14px 16px",background:DARK3,borderRadius:10,marginBottom:20 }}>
          <div style={{ color:GREEN,fontSize:12,fontWeight:700,marginBottom:10 }}>➕ Ajouter un critère</div>
          <div style={{ display:"flex",gap:8,marginBottom:8 }}>
            <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Intitulé du critère..."
              onKeyDown={e=>e.key==="Enter"&&addCriteria()}
              style={{ flex:1,background:DARK,border:"1px solid "+BRD,borderRadius:7,color:TXT,padding:"7px 10px",fontSize:12 }} />
          </div>
          <div style={{ display:"flex",gap:8,alignItems:"center" }}>
            <select value={newCat} onChange={e=>setNewCat(e.target.value)}
              style={{ flex:1,background:DARK,border:"1px solid "+BRD,borderRadius:7,color:TXT,padding:"7px 10px",fontSize:12 }}>
              {[...categories,"Personnalisé"].map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={addCriteria} disabled={saving||!newLabel.trim()} style={{ padding:"7px 18px",background:newLabel.trim()?GREEN:TXT3,border:"none",borderRadius:7,color:"#fff",fontWeight:700,cursor:newLabel.trim()?"pointer":"not-allowed",fontSize:12 }}>Ajouter</button>
          </div>
        </div>
        {/* Liste */}
        {[...new Set(list.map(c=>c.category))].map(cat=>(
          <div key={cat} style={{ marginBottom:16 }}>
            <div style={{ color:CYAN,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8,borderBottom:"1px solid "+BRD,paddingBottom:4 }}>{cat}</div>
            {list.filter(c=>c.category===cat).map(c=>(
              <div key={c.id} style={{ display:"flex",alignItems:"center",gap:8,padding:"7px 4px",borderBottom:"1px solid "+DARK3 }}>
                <span style={{ flex:1,color:c.active?TXT:TXT3,fontSize:12,textDecoration:c.active?"none":"line-through" }}>{c.label}</span>
                <button onClick={()=>toggleActive(c)} style={{ padding:"3px 10px",background:c.active?GREEN+"22":DARK3,border:"1px solid "+(c.active?GREEN:BRD),borderRadius:5,color:c.active?GREEN:TXT3,fontSize:10,fontWeight:700,cursor:"pointer" }}>
                  {c.active?"✓ Actif":"Désactivé"}
                </button>
                <button onClick={()=>deleteCriteria(c)} title="Supprimer" style={{ padding:"3px 8px",background:RED+"11",border:"1px solid "+RED+"44",borderRadius:5,color:RED,fontSize:11,cursor:"pointer" }}>✕</button>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );

// ─── Décode le payload JWT sans vérification (usage client uniquement) ───
function decodeJwtPayload(token) {
  try {
    const payload = token.split('.')[1];
    return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
  } catch { return null; }
}

// ─── Main App ───
function App() {
  // Tenter de restaurer la session depuis sessionStorage
  const [user, setUser] = useState(() => {
    const token = getToken();
    if (!token) return null;
    const payload = decodeJwtPayload(token);
    if (!payload || payload.exp * 1000 < Date.now()) { setToken(null); return null; }
    return payload;
  });
  const [all, setAll] = useState({});
  const [loading, setLoading] = useState(false);
  const [admin, setAdmin] = useState(false);
  const [af, setAf] = useState("all");
  const [teamPole, setTeamPole] = useState("all");
  const [settings, setSettings] = useState(false);
  const [empModal, setEmpModal] = useState(false);
  const [tick, setTick] = useState(0);
  const [empList, setEmpList] = useState(DEFAULT_EMPLOYEES);
  const allRef = useRef(all);
  allRef.current = all;
  // ─── États Import Excel ───────────────────────────────────
  const [importModal, setImportModal] = useState(false);
  // ─── États Rentabilité ────────────────────────────────────
  const [profitabilityOpen, setProfitabilityOpen] = useState(false);
  const [kpiOpen, setKpiOpen] = useState(false);
  const [kpiCriteria, setKpiCriteria] = useState([]);
  useEffect(() => { if (user) authFetch("/api/kpi/criteria").then(r=>r.json()).then(setKpiCriteria).catch(()=>{}); }, [user]);
  const [fixedCostsOpen, setFixedCostsOpen]       = useState(false);
  // ─── Mode sombre/clair ────────────────────────────────────
  const [isDark, setIsDark] = useState(() => localStorage.getItem('kbtheme') !== 'light');
  applyTheme(isDark);
  // ─── États IA ─────────────────────────────────────────────
  const [chatOpen, setChatOpen] = useState(false);
  const [workloadOpen, setWorkloadOpen] = useState(false);
  const [reportOpen, setReportOpen] = useState(false);
  const [prioritizing, setPrioritizing] = useState(null);
  const [prioritizeMsg, setPrioritizeMsg] = useState(null);
  const [briefing, setBriefing] = useState(null);
  const [showBriefing, setShowBriefing] = useState(true);
  const [inactivityPaused, setInactivityPaused] = useState(false);
  const lastActivityRef = useRef(Date.now());
  const INACTIVITY_MS = 5 * 60 * 1000; // 5 minutes

  // Charger la liste minimale (sans auth) pour l'écran de login
  useEffect(() => {
    fetch('/api/auth/users').then(r => r.json()).then(list => {
      if (list && list.length > 0) setEmpList(list);
    }).catch(() => {});
  }, []);

  // Recharger la liste complète (avec auth, inclut TJM + email) après login
  useEffect(() => {
    if (!user) return;
    (async () => {
      const stored = await loadEmployees();
      if (stored && stored.length > 0) setEmpList(stored);
    })();
  }, [user]);

  useEffect(() => { const id = setInterval(() => setTick((t) => t + 1), 1000); return () => clearInterval(id); }, []);

  // ─── Pause automatique après 5 min d'inactivité ──────────
  useEffect(() => {
    const onActivity = () => { lastActivityRef.current = Date.now(); };
    window.addEventListener("mousemove", onActivity);
    window.addEventListener("keydown",   onActivity);
    window.addEventListener("click",     onActivity);
    window.addEventListener("scroll",    onActivity);

    const id = setInterval(() => {
      if (Date.now() - lastActivityRef.current < INACTIVITY_MS) return;
      const current = allRef.current;
      const hasRunning = Object.values(current).some((tasks) => tasks.some((t) => t.timerRunning));
      if (!hasRunning) return;
      const now = Date.now();
      setAll((prev) => {
        const next = {};
        Object.entries(prev).forEach(([name, tasks]) => {
          const updated = tasks.map((t) => {
            if (!t.timerRunning) return t;
            const elapsed = t.timerStartedAt ? Math.floor((now - t.timerStartedAt) / 1000) : 0;
            return { ...t, timerRunning: false, timerStartedAt: null, timerSeconds: (t.timerSeconds || 0) + elapsed };
          });
          saveTasks(name, updated);
          next[name] = updated;
        });
        return next;
      });
      setInactivityPaused(true);
      setTimeout(() => setInactivityPaused(false), 6000);
    }, 30000); // vérifie toutes les 30 secondes

    return () => {
      clearInterval(id);
      window.removeEventListener("mousemove", onActivity);
      window.removeEventListener("keydown",   onActivity);
      window.removeEventListener("click",     onActivity);
      window.removeEventListener("scroll",    onActivity);
    };
  }, []);
  useEffect(() => {
    if (tick % 10 !== 0 || tick === 0) return;
    Object.entries(allRef.current).forEach(([n, t]) => { if (t.some((x) => x.timerRunning)) saveTasks(n, t); });
  }, [tick]);

  // ─── refetchAll : recharger toutes les tâches (après actions IA) ──
  const refetchAll = useCallback(async () => {
    if (!user) return;
    if (user.pole === "Direction") {
      const ms = empList.filter((e) => e.pole === "Direction");
      const ld = {};
      for (const m of ms) ld[m.name] = await loadTasks(m.name);
      setAll(ld);
    } else if (user.isAdmin) {
      const ms = empList.filter((e) => !e.isAdmin);
      const ld = {};
      for (const m of ms) ld[m.name] = await loadTasks(m.name);
      setAll(ld);
    } else if (user.isChef) {
      const ms = empList.filter((e) => e.pole === user.pole);
      const ld = {};
      for (const m of ms) ld[m.name] = await loadTasks(m.name);
      setAll(ld);
    } else {
      setAll({ [user.name]: await loadTasks(user.name) });
    }
  }, [user, empList]);

  // ─── Charger le briefing IA au login ───────────────────────
  useEffect(() => {
    if (!user) return;
    setShowBriefing(true);
    aiBriefing(user.name).then((b) => { if (b) setBriefing(b); }).catch(() => {});
  }, [user]);

  useEffect(() => {
    if (!user) return;
    (async () => {
      setLoading(true);
      if (user.pole === "Direction") {
        // Utilisateur Admin (Direction) : charge toutes les tâches Direction (y compris les siennes)
        const ms = empList.filter((e) => e.pole === "Direction");
        const ld = {};
        for (const m of ms) ld[m.name] = await loadTasks(m.name);
        setAll(ld);
      } else if (user.isAdmin) {
        // Super Admin : charge toute l'équipe tech + l'espace Admin
        const ms = empList.filter((e) => !e.isAdmin);
        const ld = {};
        for (const m of ms) ld[m.name] = await loadTasks(m.name);
        setAll(ld);
      } else if (user.isChef) {
        const ms = empList.filter((e) => e.pole === user.pole);
        const ld = {};
        for (const m of ms) ld[m.name] = await loadTasks(m.name);
        setAll(ld);
      } else {
        setAll({ [user.name]: await loadTasks(user.name) });
      }
      setLoading(false);
    })();
  }, [user, empList]);

  const upd = useCallback((n, tasks) => {
    setAll((p) => { saveTasks(n, tasks); return { ...p, [n]: tasks }; });
  }, []);

  const reassign = useCallback((fromName, toName, task) => {
    setAll((prev) => {
      const fromTasks = (prev[fromName] || []).filter((t) => t.id !== task.id);
      const toTasks = [...(prev[toName] || []), task];
      saveTasks(fromName, fromTasks);
      saveTasks(toName, toTasks);
      return { ...prev, [fromName]: fromTasks, [toName]: toTasks };
    });
  }, []);

  const toggleTimer = useCallback((empName, taskId) => {
    setAll((prev) => {
      const tasks = prev[empName] || [];
      const task = tasks.find((t) => t.id === taskId);
      if (!task) return prev;
      const isStarting = !task.timerRunning;
      const now = Date.now();
      const updated = tasks.map((t) => {
        if (t.id === taskId) {
          if (isStarting) return { ...t, timerRunning: true, timerStartedAt: now };
          const elapsed = t.timerStartedAt ? Math.floor((now - t.timerStartedAt) / 1000) : 0;
          return { ...t, timerRunning: false, timerStartedAt: null, timerSeconds: (t.timerSeconds || 0) + elapsed };
        }
        if (isStarting && t.timerRunning) {
          const elapsed = t.timerStartedAt ? Math.floor((now - t.timerStartedAt) / 1000) : 0;
          return { ...t, timerRunning: false, timerStartedAt: null, timerSeconds: (t.timerSeconds || 0) + elapsed };
        }
        return t;
      });
      saveTasks(empName, updated);
      return { ...prev, [empName]: updated };
    });
  }, []);

  const logout = () => {
    const now = Date.now();
    Object.entries(all).forEach(([n, tasks]) => {
      const stopped = tasks.map((t) => {
        if (t.timerRunning) {
          const elapsed = t.timerStartedAt ? Math.floor((now - t.timerStartedAt) / 1000) : 0;
          return { ...t, timerRunning: false, timerStartedAt: null, timerSeconds: (t.timerSeconds || 0) + elapsed };
        }
        return t;
      });
      saveTasks(n, stopped);
    });
    setToken(null); // effacer le JWT
    setUser(null); setAll({}); setAdmin(false);
  };

  const handleSaveEmployees = async (newList) => {
    await saveEmployees(newList);
    setEmpList(newList);
    setEmpModal(false);
  };

  // ─── Fonction : Import Excel ──────────────────────────────
  const handleImport = useCallback(async (byPerson) => {
    setAll((prev) => {
      const next = { ...prev };
      Object.entries(byPerson).forEach(([name, newTasks]) => {
        const existing = next[name] || [];
        const merged = [...existing, ...newTasks];
        saveTasks(name, merged);
        next[name] = merged;
      });
      return next;
    });
  }, []);

  // ─── Fonction IA : priorisation ───────────────────────────
  const handlePrioritize = useCallback(async (ownerName) => {
    setPrioritizing(ownerName);
    try {
      const result = await aiPrioritize(ownerName);
      if (result.order && result.order.length > 0) {
        setAll((prev) => {
          const tasks   = prev[ownerName] || [];
          const ordered = result.order.map((id) => tasks.find((t) => t.id === id)).filter(Boolean);
          const rest    = tasks.filter((t) => !result.order.includes(t.id));
          const newTasks = [...ordered, ...rest];
          saveTasks(ownerName, newTasks);
          return { ...prev, [ownerName]: newTasks };
        });
      }
      if (result.reasoning) setPrioritizeMsg({ name: ownerName, msg: result.reasoning });
    } catch (e) {
      console.error("Prioritize error:", e);
    }
    setPrioritizing(null);
  }, []);

  // Build the tasks to export depending on user role
  const getExportData = () => {
    if (user.isAdmin || user.canViewAll || user.canViewTJM) return all;
    if (user.isChef) return all;
    return { [user.name]: all[user.name] || [] };
  };

  if (!user) return <LoginScreen onLogin={setUser} employees={empList} />;

  const my = all[user.name] || [];
  const isDirectionUser = user.canViewKPI || user.canViewTJM || user.canViewAll;
  const canSeeTeam = user.isChef || user.isAdmin || isDirectionUser;

  // Direction users ne voient pas les boards de l'équipe technique (seulement leurs collègues Admin)
  const pm = user.pole === "Direction"
    ? []
    : (user.isAdmin || user.canViewAll || user.canViewKPI || user.canViewTJM)
      ? empList.filter((e) => !e.isAdmin && e.pole !== "Direction")
      : empList.filter((e) => e.pole === user.pole && !e.isChef);

  // Membres Direction visibles en vue équipe
  const directionMembers = (user.isAdmin || user.pole === "Direction")
    ? empList.filter((e) => e.pole === "Direction")
    : [];

  const pmFiltered = teamPole === "all" ? pm
    : teamPole === "fluide" ? pm.filter((m) => m.pole === "Fluide")
    : teamPole === "elec"   ? pm.filter((m) => m.pole === "Élec")
    : []; // "admin" → seulement l'espace Admin, pas les membres normaux

  const fm = af === "all" ? pmFiltered : pmFiltered.filter((m) => {
    const t = all[m.name] || [];
    if (af === "overdue") return t.some((x) => x.deadline && new Date(x.deadline) < new Date() && x.column !== "done");
    if (af === "high") return t.some((x) => x.priority === "high" && x.column !== "done");
    if (af === "timer") return t.some((x) => x.timerRunning);
    return true;
  });

  const showDirectionSection = (user.isAdmin || user.pole === "Direction") && directionMembers.length > 0 && (teamPole === "all" || teamPole === "admin");
  const statsBase = teamPole === "admin" ? directionMembers : fm;
  const apt = statsBase.flatMap((m) => all[m.name] || []);
  const tot = apt.length;
  const dn = apt.filter((t) => t.column === "done").length;
  const activeTimers = apt.filter((t) => t.timerRunning).length;

  return (
    <div style={{ minHeight: "100vh", background: DARK, fontFamily: "'Outfit','Segoe UI',sans-serif", display: "flex", flexDirection: "column" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
      <style>{"*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:" + BRD + ";border-radius:99px}select option{background:" + DARK + ";color:" + TXT + "}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}"}</style>

      <div style={{ padding: "12px 24px", borderBottom: "1px solid " + BRD, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, position: "sticky", top: 0, zIndex: 100, background: DARK }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <Logo size={32} />
          <div style={{ width: 1, height: 24, background: BRD }} />
          <div>
            <div style={{ color: TXT, fontSize: 14, fontWeight: 700 }}>{user.name}</div>
            <div style={{ color: TXT3, fontSize: 11 }}>{user.role}</div>
          </div>
          {user.isAdmin && <span style={{ fontSize: 9, padding: "2px 9px", borderRadius: 99, background: PURPLE + "22", color: PURPLE, fontWeight: 700, textTransform: "uppercase" }}>Super Admin</span>}
          {user.pole === "Direction" && <span style={{ fontSize: 9, padding: "2px 9px", borderRadius: 99, background: GREEN + "22", color: GREEN, fontWeight: 700, textTransform: "uppercase" }}>Admin</span>}
          {my.some((t) => t.timerRunning) && <span style={{ fontSize: 10, padding: "3px 10px", borderRadius: 99, background: CYAN + "22", color: CYAN, fontWeight: 700, animation: "pulse 1.5s infinite" }}>⏱ Timer actif</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {canSeeTeam && (
            <button onClick={() => setAdmin(!admin)} style={{ padding: "8px 14px", background: admin ? ORANGE + "22" : DARK2, border: "1px solid " + (admin ? ORANGE : BRD), borderRadius: 8, color: admin ? ORANGE : TXT2, fontWeight: 600, fontSize: 12, cursor: "pointer" }}>
              {admin ? "👤 Mon tableau" : user.isAdmin ? "👥 Vue globale" : user.pole === "Direction" ? "👥 Vue Admin" : "👥 Vue équipe"}
            </button>
          )}
          <button onClick={() => exportToExcel(getExportData(), empList)} title="Exporter en Excel" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + BRD, borderRadius: 8, color: GREEN, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>📊 Export</button>
          {(user.isAdmin || user.isChef) && (
            <button onClick={() => setImportModal(true)} title="Importer une liste de livrables Excel" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + CYAN + "66", borderRadius: 8, color: CYAN, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>📥 Import</button>
          )}
          {user.isAdmin && (
            <button onClick={() => setEmpModal(true)} title="Gérer les collaborateurs" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + BRD, borderRadius: 8, color: CYAN, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>👥 Équipe</button>
          )}
          {(user.isAdmin || user.canViewTJM || user.canViewAll) && (
            <>
              <button onClick={() => setProfitabilityOpen(true)} title="Tableau de rentabilité" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + GREEN + "66", borderRadius: 8, color: GREEN, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>💰 Rentabilité</button>
            </>
          )}
          {(user.isAdmin || user.canViewAll) && (
            <>
              <button onClick={() => setFixedCostsOpen(true)} title="Frais fixes mensuels" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + ORANGE + "44", borderRadius: 8, color: ORANGE, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>⚙️ Frais fixes</button>
            </>
          )}
          {(user.isAdmin || user.isChef || user.canViewAll) && (
            <>
              <button onClick={() => setWorkloadOpen(true)} title="Analyse de charge IA" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + PURPLE + "66", borderRadius: 8, color: PURPLE, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>⚡ Charge IA</button>
              {(user.isAdmin || user.canViewAll) && <button onClick={() => setReportOpen(true)} title="Rapport hebdomadaire IA" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + ORANGE + "66", borderRadius: 8, color: ORANGE, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>📊 Rapport IA</button>}
            </>
          )}
          {(user.isAdmin || user.isChef || user.canViewKPI || user.canViewAll) && (
            <button onClick={() => setKpiOpen(true)} title="Évaluations KPI des membres" style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + PURPLE + "66", borderRadius: 8, color: PURPLE, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>📋 KPI</button>
          )}
          <button onClick={() => setChatOpen((v) => !v)} title="Agent IA — Peut créer et gérer les tâches" style={{ padding: "8px 14px", background: chatOpen ? BLUE + "33" : DARK2, border: "2px solid " + (chatOpen ? BLUE : BLUE + "55"), borderRadius: 8, color: chatOpen ? BLUE : BLUE, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>🤖 Agent IA</button>
          <button onClick={() => { const n=!isDark; localStorage.setItem('kbtheme',n?'dark':'light'); applyTheme(n); setIsDark(n); }} title={isDark?"Mode clair":"Mode sombre"} style={{ padding:"8px 14px", background:DARK2, border:"1px solid "+BRD, borderRadius:8, color:TXT2, fontWeight:600, fontSize:14, cursor:"pointer" }}>{isDark ? "☀️" : "🌙"}</button>
          <button onClick={() => setSettings(true)} style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + BRD, borderRadius: 8, color: TXT2, fontWeight: 600, fontSize: 12, cursor: "pointer" }}>🔐</button>
          <button onClick={logout} style={{ padding: "8px 14px", background: DARK2, border: "1px solid " + BRD, borderRadius: 8, color: TXT2, fontWeight: 600, fontSize: 12, cursor: "pointer" }}>Déconnexion</button>
        </div>
      </div>

      {showBriefing && briefing && <DailyBriefingBanner briefing={briefing} onClose={() => setShowBriefing(false)} />}
      {loading
        ? <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: TXT2 }}>Chargement...</div></div>
        : admin && canSeeTeam
          ? (
            <div style={{ flex: 1, overflow: "auto", padding: 20 }}>
              <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
                {[{ l: "Total", v: tot, c: BLUE }, { l: "Terminées", v: dn, c: GREEN }, { l: "Timers actifs", v: activeTimers, c: CYAN }, { l: "Progression", v: tot > 0 ? Math.round((dn / tot) * 100) + "%" : "—", c: PURPLE }].map((s) => (
                  <div key={s.l} style={{ padding: "12px 18px", background: DARK2, border: "1px solid " + BRD, borderRadius: 10, borderLeft: "3px solid " + s.c, minWidth: 120 }}>
                    <div style={{ color: TXT3, fontSize: 9, fontWeight: 600, textTransform: "uppercase" }}>{s.l}</div>
                    <div style={{ color: TXT, fontSize: 20, fontWeight: 800, marginTop: 3 }}>{s.v}</div>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                {[{ id: "all", l: "Tous les pôles" }, { id: "fluide", l: "🔵 Fluide" }, { id: "elec", l: "🔴 Élec" }, { id: "admin", l: "🏢 Admin" }].map((f) => (
                  <button key={f.id} onClick={() => setTeamPole(f.id)} style={{ padding: "6px 14px", background: teamPole === f.id ? GREEN + "22" : DARK2, border: "1px solid " + (teamPole === f.id ? GREEN + "66" : BRD), borderRadius: 6, color: teamPole === f.id ? GREEN : TXT3, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{f.l}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
                {[{ id: "all", l: "Tous" }, { id: "timer", l: "⏱ Timer actif" }, { id: "overdue", l: "⚠️ En retard" }, { id: "high", l: "🔴 Prio haute" }].map((f) => (
                  <button key={f.id} onClick={() => setAf(f.id)} style={{ padding: "6px 14px", background: af === f.id ? BLUE + "22" : DARK2, border: "1px solid " + (af === f.id ? BLUE + "66" : BRD), borderRadius: 6, color: af === f.id ? BLUE : TXT3, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{f.l}</button>
                ))}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                {fm.map((m) => (
                  <Board key={m.name} name={m.name} tasks={all[m.name] || []} onUpdate={upd} ro={false} showName={true} onToggleTimer={toggleTimer} tick={tick} poleMembers={fm.filter((x) => x.name !== m.name)} onReassign={reassign} onPrioritize={handlePrioritize} prioritizing={prioritizing} />
                ))}
                {fm.length === 0 && <div style={{ textAlign: "center", padding: 40, color: TXT3 }}>Aucun résultat.</div>}
              </div>

              {/* ─── Section Kanban Direction (Admin) ─────────────────── */}
              {showDirectionSection && (
                <div style={{ marginTop: 32 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                    <div style={{ height: 1, flex: 1, background: GREEN + "33" }} />
                    <span style={{ color: GREEN, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, padding: "4px 12px", background: GREEN + "15", borderRadius: 99, border: "1px solid " + GREEN + "44" }}>🏢 Espace Admin</span>
                    <div style={{ height: 1, flex: 1, background: GREEN + "33" }} />
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                    {directionMembers.map((m) => (
                      <Board key={m.name} name={m.name} tasks={all[m.name] || []} onUpdate={upd} ro={false} showName={true} onToggleTimer={toggleTimer} tick={tick} poleMembers={null} onReassign={null} onPrioritize={handlePrioritize} prioritizing={prioritizing} />
                    ))}
                  </div>
                </div>
              )}
            </div>
          )
          : (
            <div style={{ flex: 1, overflow: "auto", padding: 20 }}>
              <Board name={user.name} tasks={my} onUpdate={upd} ro={false} showName={false} onToggleTimer={toggleTimer} tick={tick} poleMembers={null} onReassign={null} />
            </div>
          )
      }

      {settings && <SettingsModal user={user} onClose={() => setSettings(false)} />}
      {empModal && user.isAdmin && <EmployeesModal employees={empList} onSave={handleSaveEmployees} onClose={() => setEmpModal(false)} />}
      {profitabilityOpen && user.isAdmin && <ProfitabilityModal onClose={() => setProfitabilityOpen(false)} />}
      {kpiOpen && (user.isAdmin || user.isChef) && <KPIPickerModal employees={empList} evaluator={user} criteria={kpiCriteria} onClose={() => setKpiOpen(false)} />}
      {fixedCostsOpen && user.isAdmin && <FixedCostsModal onClose={() => setFixedCostsOpen(false)} />}
      {importModal && (user.isAdmin || user.isChef) && <ImportExcelModal employees={empList} allTasks={all} onImport={handleImport} onClose={() => setImportModal(false)} />}
      {workloadOpen && <WorkloadModal onClose={() => setWorkloadOpen(false)} />}
      {reportOpen && <ReportModal onClose={() => setReportOpen(false)} />}
      {chatOpen && <AIChatPanel user={user} onClose={() => setChatOpen(false)} onAction={refetchAll} />}
      {prioritizeMsg && <PrioritizeToast name={prioritizeMsg.name} msg={prioritizeMsg.msg} onClose={() => setPrioritizeMsg(null)} />}
      {inactivityPaused && (
        <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: DARK2, border: "1px solid " + ORANGE + "66", borderLeft: "4px solid " + ORANGE, borderRadius: 12, padding: "12px 20px", zIndex: 4000, boxShadow: "0 8px 32px rgba(0,0,0,0.5)", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>⏸</span>
          <div>
            <div style={{ color: ORANGE, fontSize: 12, fontWeight: 700 }}>Timer mis en pause</div>
            <div style={{ color: TXT2, fontSize: 11 }}>Inactivité détectée depuis 5 minutes</div>
          </div>
        </div>
      )}}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
