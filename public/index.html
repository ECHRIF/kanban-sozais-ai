// ─── Auth : token JWT ──────────────────────────────────
function getToken() { return sessionStorage.getItem('_kbt') || ''; }
function setToken(t) { if (t) sessionStorage.setItem('_kbt', t); else sessionStorage.removeItem('_kbt'); }

// authFetch : ajoute automatiquement le header Authorization
async function authFetch(url, opts = {}) {
  const token = getToken();
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}), ...(token ? { Authorization: 'Bearer ' + token } : {}) }
  });
}

function exportToExcel(allTasks, empList) {
  const BOM = "\uFEFF";
  const SEP = ";";
  const colLabel = { backlog: "Backlog", todo: "À faire", in_progress: "En cours", review: "En revue", done: "Terminé" };
  const prioLabel = { high: "Haute", medium: "Moyenne", low: "Basse" };
  const headers = ["Collaborateur", "Pôle", "Rôle", "Titre", "Projet", "Description", "Priorité", "Colonne", "Échéance", "H. estimées", "H. réalisées", "Dépassement", "Timer", "TJM (€/j)", "Coût MO (€)", "CA livrable (€)"];
  const rows = [];
  Object.entries(allTasks).forEach(([ownerName, tasks]) => {
    const emp = empList.find((e) => e.name === ownerName);
    const tjm = emp ? (parseFloat(emp.tjm) || 0) : 0;
    tasks.forEach((t) => {
      const secs = t.timerSeconds || 0;
      const est = t.estimatedHours ? parseFloat(t.estimatedHours) : 0;
      const actH = secs / 3600;
      const over = est > 0 && actH > est;
      const coutMO = tjm > 0 ? (actH / 8 * tjm).toFixed(2) : "";
      rows.push([
        ownerName,
        emp ? emp.pole : "",
        emp ? emp.role : "",
        t.title || "",
        t.project || "",
        t.description || "",
        prioLabel[t.priority] || t.priority || "",
        colLabel[t.column] || t.column || "",
        t.deadline || "",
        est > 0 ? est.toFixed(1) : "",
        actH > 0 ? actH.toFixed(2) : "",
        over ? ("+" + (actH - est).toFixed(1) + "h") : "",
        t.timerRunning ? "En cours" : "",
        tjm > 0 ? tjm.toFixed(2) : "",
        coutMO,
        t.revenueAmount > 0 ? parseFloat(t.revenueAmount).toFixed(2) : "",
      ]);
    });
  });
  const escape = (v) => '"' + String(v).replace(/"/g, '""') + '"';
  const csv = BOM + [headers.map(escape).join(SEP), ...rows.map((r) => r.map(escape).join(SEP))].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kanban-export-" + new Date().toISOString().slice(0, 10) + ".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function ActionCard({ action }) {
  const icons = { create_task: '✅', update_task: '✏️', move_task: '🔀', reassign_task: '👤', delete_task: '🗑️', bulk_create_tasks: '📋' };
  const colors = { create_task: GREEN, update_task: BLUE, move_task: ORANGE, reassign_task: PURPLE, delete_task: RED, bulk_create_tasks: CYAN };
  const labels = { create_task: 'Tâche créée', update_task: 'Tâche mise à jour', move_task: 'Tâche déplacée', reassign_task: 'Tâche réaffectée', delete_task: 'Tâche supprimée', bulk_create_tasks: 'Tâches créées en lot' };
  const color = colors[action.tool] || TXT3;
  const icon = icons[action.tool] || '⚡';
  const label = labels[action.tool] || action.tool;

  let detail = '';
  if (action.input) {
    if (action.input.title) detail = action.input.title;
    else if (action.input.task_id) detail = 'ID: ' + action.input.task_id;
    else if (action.input.tasks) detail = action.input.tasks.length + ' tâche(s)';
    if (action.input.owner_name) detail += (detail ? ' → ' : '') + action.input.owner_name;
    if (action.input.new_column) detail += ' [' + action.input.new_column + ']';
  }

  return (
    <div style={{ margin: '4px 0', padding: '8px 11px', borderRadius: 9, background: color + '15', border: '1px solid ' + color + '44', borderLeft: '3px solid ' + color }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <span style={{ fontSize: 13 }}>{icon}</span>
        <span style={{ color: color, fontSize: 11, fontWeight: 700 }}>{label}</span>
      </div>
      {detail && <div style={{ color: TXT3, fontSize: 10, marginTop: 3, paddingLeft: 20 }}>{detail}</div>}
    </div>
  );
}

function AIChatPanel({ user, onClose, onAction }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [configOpen, setConfigOpen] = useState(false);
  const [agentName, setAgentName] = useState(() => localStorage.getItem('agentName') || 'SOZAIS IA');

  const [agentEmoji, setAgentEmoji] = useState(() => localStorage.getItem('agentEmoji') || '🤖');

  const saveConfig = () => {
    localStorage.setItem('agentName', agentName);
    localStorage.setItem('agentStyle', agentStyle);
    localStorage.setItem('agentEmoji', agentEmoji);
    setConfigOpen(false);
  };

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    const userMsg = { role: 'user', content: text };
    const next = [...messages, userMsg];
    setMessages(next); setInput(""); setLoading(true);

      const assistantMsg = { role: 'assistant', content: reply, actions: actions || [] };

        {messages.map((m, i) => (

            <div style={{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth: '88%', padding: '8px 12px', borderRadius: m.role === 'user' ? '12px 12px 2px 12px' : '12px 12px 12px 2px', background: m.role === 'user' ? BLUE : DARK3, color: TXT, fontSize: 12, lineHeight: 1.55, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
                {m.content}

            {m.actions && m.actions.length > 0 && (
              <div style={{ marginTop: 6, paddingLeft: 4 }}>
                {m.actions.map((a, j) => <ActionCard key={j} action={a} />)}

        {loading && (

            <div style={{ padding: '8px 13px', borderRadius: '12px 12px 12px 2px', background: DARK3, color: TXT3, fontSize: 11, animation: 'pulse 1.5s infinite' }}>🤖 Agent en action...</div>
          </div>

        <div ref={bottomRef} />

      {/* Input */}
      <div style={{ padding: '10px 12px', borderTop: '1px solid ' + BRD, display: 'flex', gap: 7 }}>
        <input value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && send()}

// ─── Composant : Import Excel ─────────────────────────────────
function ImportExcelModal({ employees, allTasks, onImport, onClose }) {
  const [step, setStep] = useState('upload');
  const [sheetNames, setSheetNames] = useState([]);
  const [selectedSheet, setSelectedSheet] = useState('');
  const [tasks, setTasks] = useState([]);
  const [lots, setLots] = useState([]);
  const [lotAssign, setLotAssign] = useState({});
  const [defaultAssign, setDefaultAssign] = useState('');
  const [importing, setImporting] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const wbRef = useRef(null);
  const fileRef = useRef(null);

  const staffList = employees.filter((e) => !e.isAdmin && e.pole !== "Direction");

  // ── Parser une feuille depuis le workbook ──────────────────
  const parseSheet = (wb, sheetName) => {
    const ws = wb.Sheets[sheetName];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });

    // Trouver la ligne de headers dynamiquement
    let hdrIdx = -1;
    const colMap = {};
    for (let i = 0; i < Math.min(raw.length, 25); i++) {
      const row = raw[i] || [];
      const titleCol = row.findIndex((c) => c && String(c).toLowerCase().includes('titre du document'));
      if (titleCol >= 0) {
        hdrIdx = i;
        row.forEach((c, ci) => {
          if (!c) return;
          const s = String(c).toLowerCase().trim();
          if (s === 'phase')                                         colMap.phase  = ci;
          else if (s === 'lot')                                      colMap.lot    = ci;
          else if (s === 'type')                                     colMap.type   = ci;
          else if (s === 'emetteur' || s === 'émetteur')             colMap.emetteur = ci;
          else if (s === 'niveau')                                   colMap.niveau = ci;
          else if (s.includes('n°') && (s.includes('doc') || s.includes('document'))) colMap.numDoc = ci;
          else if (s.includes('titre du document'))                  colMap.title  = ci;
          else if (s.includes('date') || s.includes('prévisionnelle') || s.includes('previsionnelle')) colMap.date = ci;
          else if (s.includes('observation'))                        colMap.obs    = ci;
          else if (s.includes('equivalent') || s.includes('équivalent') || s === '€' || s.includes('montant')) colMap.equiv  = ci;
        });
        break;
      }
    }

    if (hdrIdx < 0 || colMap.title === undefined) return [];

    const get = (row, key) => (colMap[key] !== undefined ? row[colMap[key]] : null);
    const fmt = (v) => (v ? String(v).trim() : '');

    const parsed = [];
    for (let i = hdrIdx + 1; i < raw.length; i++) {
      const row = raw[i] || [];
      const title = fmt(get(row, 'title'));
      if (!title) continue;
      // Ignorer les lignes de section (< 3 valeurs non-nulles)
      if (row.filter((v) => v !== null && v !== undefined && String(v).trim() !== '').length < 3) continue;

      // Détecter la date (format ISO ou Excel serial)
      let deadline = '';
      const dateRaw = get(row, 'date');
      if (dateRaw) {
        const s = String(dateRaw);
        const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (m) deadline = `${m[1]}-${m[2]}-${m[3]}`;
      }

      const phase  = fmt(get(row, 'phase'));
      const lot    = fmt(get(row, 'lot'));
      const niveau = fmt(get(row, 'niveau'));
      const numDoc = fmt(get(row, 'numDoc'));
      const obs    = fmt(get(row, 'obs'));

      const descParts = [];
      if (niveau) descParts.push(`Niveau : ${niveau}`);
      if (numDoc) descParts.push(`Réf. : ${numDoc}`);
      if (obs)    descParts.push(obs);

      const equivRaw = fmt(get(row, 'equiv'));
      const revenueAmount = equivRaw ? (parseFloat(equivRaw.replace(/[^\d.,]/g, '').replace(',', '.')) || 0) : 0;

      parsed.push({
        id:            genId(),
        title,
        project:       [phase, lot].filter(Boolean).join(' — '),
        description:   descParts.join('\n'),
        priority:      'medium',
        column:        'todo',
        deadline,
        estimatedHours: '',
        timerSeconds:   0,
        timerRunning:   false,
        timerStartedAt: null,
        createdAt:      new Date().toISOString(),
        revenueAmount,
        _lot:           lot,
      });
    }
    return parsed;
  };

  // ── Charger un fichier ────────────────────────────────────
  const loadFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      wbRef.current = wb;
      setSheetNames(wb.SheetNames);
      const first = wb.SheetNames[0];
      setSelectedSheet(first);
      applySheet(wb, first);
    };
    reader.readAsArrayBuffer(file);
  };

  const applySheet = (wb, name) => {
    const parsed = parseSheet(wb, name);
    setTasks(parsed);
    const uniqueLots = [...new Set(parsed.map((t) => t._lot).filter(Boolean))];
    setLots(uniqueLots);
    setLotAssign(Object.fromEntries(uniqueLots.map((l) => [l, ''])));
    setStep('preview');
  };

  const changeSheet = (name) => {
    setSelectedSheet(name);
    applySheet(wbRef.current, name);
  };

  // ── Compter les tâches assignées ─────────────────────────
  const assigned = tasks.filter((t) => !!(lotAssign[t._lot] || defaultAssign)).length;

  // ── Confirmer l'import ────────────────────────────────────
  const doImport = async () => {
    setImporting(true);
    const byPerson = {};
    tasks.forEach((t) => {
      const { _lot, ...clean } = t;
      const who = lotAssign[_lot] || defaultAssign;
      if (!who) return;
      if (!byPerson[who]) byPerson[who] = [];
      byPerson[who].push(clean);
    });
    await onImport(byPerson);
    setImporting(false);
    onClose();
  };

  const lotColor = { CVC: BLUE, PLB: CYAN, CVPB: PURPLE, RSV: GREEN, TL: ORANGE };
  const getLotColor = (l) => lotColor[l] || TXT3;

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2000 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: DARK2, border: '1px solid ' + BRD, borderRadius: 16, padding: 28, width: '100%', maxWidth: 700, maxHeight: '90vh', overflowY: 'auto' }}>

        {/* ── Header ── */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 22 }}>
          <div>
            <h2 style={{ color: TXT, fontSize: 18, fontWeight: 700, margin: 0 }}>📥 Import liste de livrables → Kanban</h2>
            <div style={{ color: TXT3, fontSize: 11, marginTop: 4 }}>Formats supportés : .xlsx · .xls — Détection automatique des colonnes</div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: TXT3, fontSize: 22, cursor: 'pointer' }}>✕</button>
        </div>

        {/* ── ÉTAPE 1 : Upload ── */}
        {step === 'upload' && (
          <div>
            <div
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={(e) => { e.preventDefault(); setDragOver(false); loadFile(e.dataTransfer.files[0]); }}
              onClick={() => fileRef.current?.click()}
              style={{ border: '2px dashed ' + (dragOver ? BLUE : BRD), borderRadius: 12, padding: '52px 32px', textAlign: 'center', cursor: 'pointer', background: dragOver ? BLUE + '08' : DARK3, transition: 'all 0.2s' }}
            >
              <div style={{ fontSize: 44, marginBottom: 12 }}>📊</div>
              <div style={{ color: TXT, fontSize: 14, fontWeight: 700, marginBottom: 6 }}>Glisser-déposer votre fichier Excel ici</div>
              <div style={{ color: TXT3, fontSize: 12, marginBottom: 16 }}>ou cliquer pour sélectionner</div>
              <div style={{ display: 'inline-block', padding: '8px 20px', background: BLUE + '22', border: '1px solid ' + BLUE + '55', borderRadius: 8, color: BLUE, fontSize: 12, fontWeight: 600 }}>.xlsx / .xls</div>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={(e) => loadFile(e.target.files[0])} />
            </div>
            <div style={{ marginTop: 16, padding: '12px 16px', background: BLUE + '11', border: '1px solid ' + BLUE + '33', borderRadius: 8 }}>
              <div style={{ color: BLUE, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>ℹ️ Colonnes détectées automatiquement</div>
              <div style={{ color: TXT2, fontSize: 11 }}>PHASE · LOT · NIVEAU · N° DOCUMENT · Titre du document · Dates prévisionnelles · Observations</div>
            </div>
          </div>
        )}

        {/* ── ÉTAPE 2 : Aperçu + Attribution ── */}
        {step === 'preview' && (
          <div>
            {/* Sélecteur de feuille */}
            {sheetNames.length > 1 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
                <label style={{ ...lBase, marginBottom: 0, whiteSpace: 'nowrap' }}>Feuille :</label>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {sheetNames.map((n) => (
                    <button key={n} onClick={() => changeSheet(n)}
                      style={{ padding: '5px 14px', background: selectedSheet === n ? BLUE + '22' : DARK3, border: '1px solid ' + (selectedSheet === n ? BLUE : BRD), borderRadius: 7, color: selectedSheet === n ? BLUE : TXT2, fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Stats */}
            <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
              {[
                { l: 'Tâches détectées', v: tasks.length, c: BLUE },
                { l: 'Lots distincts',   v: lots.length,  c: PURPLE },
                { l: 'Prêtes à importer', v: assigned,    c: GREEN },
              ].map((s) => (
                <div key={s.l} style={{ flex: 1, padding: '10px 14px', background: DARK3, borderRadius: 10, borderLeft: '3px solid ' + s.c }}>
                  <div style={{ color: TXT3, fontSize: 9, fontWeight: 700, textTransform: 'uppercase' }}>{s.l}</div>
                  <div style={{ color: TXT, fontSize: 22, fontWeight: 800, marginTop: 2 }}>{s.v}</div>
                </div>
              ))}
            </div>

            {/* Assignation globale */}
            <div style={{ marginBottom: 16, padding: '14px 16px', background: DARK3, borderRadius: 10, border: '1px solid ' + BRD }}>
              <label style={lBase}>Assigner toutes les tâches à un seul ingénieur (optionnel)</label>
              <select value={defaultAssign} onChange={(e) => setDefaultAssign(e.target.value)} style={iBase}>
                <option value="">— Ou choisir par lot ci-dessous —</option>
                {staffList.map((e) => <option key={e.name} value={e.name}>{e.name} ({e.role})</option>)}
              </select>
            </div>

            {/* Assignation par lot */}
            {lots.length > 0 && (
              <div style={{ marginBottom: 18 }}>
                <div style={{ color: TXT3, fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Attribution par lot</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
                  {lots.map((lot) => {
                    const cnt = tasks.filter((t) => t._lot === lot).length;
                    const c = getLotColor(lot);
                    return (
                      <div key={lot} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: DARK3, borderRadius: 9, border: '1px solid ' + BRD }}>
                        <span style={{ fontSize: 10, padding: '3px 12px', borderRadius: 99, background: c + '22', color: c, fontWeight: 800, minWidth: 56, textAlign: 'center' }}>{lot}</span>
                        <span style={{ color: TXT3, fontSize: 11, flex: 1 }}>{cnt} tâche{cnt > 1 ? 's' : ''}</span>
                        <select
                          value={lotAssign[lot] || ''}
                          onChange={(e) => setLotAssign((prev) => ({ ...prev, [lot]: e.target.value }))}
                          style={{ ...iBase, width: 'auto', minWidth: 220, padding: '6px 10px', fontSize: 12 }}>
                          <option value="">— Choisir un ingénieur —</option>
                          {staffList.map((e) => <option key={e.name} value={e.name}>{e.name} — {e.role}</option>)}
                        </select>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Aperçu du tableau */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ color: TXT3, fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>
                Aperçu des {tasks.length} tâches
              </div>
              <div style={{ maxHeight: 230, overflowY: 'auto', borderRadius: 9, border: '1px solid ' + BRD }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
                  <thead>
                    <tr style={{ background: DARK3, position: 'sticky', top: 0 }}>
                      {['LOT', 'Titre', 'Niveau / Réf.', 'Échéance', 'Assigné à'].map((h) => (
                        <th key={h} style={{ padding: '7px 10px', color: TXT3, fontWeight: 700, textAlign: 'left', borderBottom: '1px solid ' + BRD, whiteSpace: 'nowrap' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {tasks.map((t, i) => {
                      const who = lotAssign[t._lot] || defaultAssign;
                      const c = getLotColor(t._lot);
                      const overdue = t.deadline && new Date(t.deadline) < new Date();
                      return (
                        <tr key={t.id} style={{ background: i % 2 === 0 ? DARK : DARK3, borderBottom: '1px solid ' + BRD + '33' }}>
                          <td style={{ padding: '6px 10px' }}>
                            <span style={{ color: c, fontWeight: 700, fontSize: 10, padding: '2px 8px', background: c + '22', borderRadius: 99 }}>{t._lot}</span>
                          </td>
                          <td style={{ padding: '6px 10px', color: TXT, maxWidth: 240, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={t.title}>{t.title}</td>
                          <td style={{ padding: '6px 10px', color: TXT3, fontSize: 10 }}>{t.description.split('\n')[0] || '—'}</td>
                          <td style={{ padding: '6px 10px', color: overdue ? ORANGE : TXT3, fontWeight: overdue ? 600 : 400 }}>
                            {t.deadline ? (overdue ? '⚠️ ' : '') + t.deadline : '—'}
                          </td>
                          <td style={{ padding: '6px 10px', color: who ? GREEN : TXT3, fontWeight: who ? 600 : 400 }}>
                            {who ? who.split(' ')[0] + ' ' + (who.split(' ')[1] || '') : '—'}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Boutons */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
              <button onClick={() => { setStep('upload'); setTasks([]); }}
                style={{ padding: '9px 18px', background: DARK, border: '1px solid ' + BRD, borderRadius: 8, color: TXT2, fontWeight: 600, cursor: 'pointer' }}>
                ← Autre fichier
              </button>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                {assigned === 0 && <span style={{ color: ORANGE, fontSize: 11, fontWeight: 600 }}>⚠️ Aucune tâche assignée</span>}
                {assigned > 0 && assigned < tasks.length && (
                  <span style={{ color: TXT3, fontSize: 11 }}>{tasks.length - assigned} tâche{tasks.length - assigned > 1 ? 's' : ''} non assignée{tasks.length - assigned > 1 ? 's' : ''} (ignorée{tasks.length - assigned > 1 ? 's' : ''})</span>
                )}
                <button onClick={doImport} disabled={importing || assigned === 0}
                  style={{ padding: '10px 26px', background: assigned > 0 && !importing ? GREEN : TXT3, border: 'none', borderRadius: 8, color: '#fff', fontWeight: 700, cursor: assigned > 0 && !importing ? 'pointer' : 'not-allowed', fontSize: 13 }}>
                  {importing ? '⏳ Import en cours...' : `✅ Importer ${assigned} tâche${assigned > 1 ? 's' : ''}`}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Login ───
function LoginScreen({ onLogin, employees }) {
  const [step, setStep] = useState("select");
  const [sel, setSel] = useState(null);
  const [pwd, setPwd] = useState("");
  const [nPwd, setNPwd] = useState("");
  const [cPwd, setCPwd] = useState("");
  const [email, setEmail] = useState("");
  const [err, setErr] = useState("");
  const [search, setSearch] = useState("");
  const [pf, setPf] = useState("all");
  const [busy, setBusy] = useState(false);
  const [resetSent, setResetSent] = useState(false);
  // token JWT + user data temporaires (reçus après login, utilisés pour change-password et set-email)
  const [tempToken, setTempToken] = useState(null);
  const [tempUser, setTempUser] = useState(null); // data.user du serveur (complet)

  const forgotPassword = async () => {
    if (!sel) return;
    setBusy(true);
    try {
      await fetch('/api/auth/forgot-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: sel.name }),
      });
      setResetSent(true);
      setPwd(""); setErr("");
    } catch { setErr("Erreur réseau, réessayez."); }
    setBusy(false);
  };

  const filtered = employees.filter((e) => {
    const matchPole = pf === "all" || (pf === "fluide" && e.pole === "Fluide") || (pf === "elec" && e.pole === "Élec") || (pf === "admin" && e.isAdmin) || (pf === "direction" && e.pole === "Direction");
    return matchPole && e.name.toLowerCase().includes(search.toLowerCase());
  });

  const checkPwd = async () => {
    setBusy(true); setErr("");
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: sel.name, password: pwd }),
      });
      const data = await r.json();
      if (!r.ok) { setErr(data.error || "Mot de passe incorrect"); setBusy(false); return; }
      setTempToken(data.token);
      setTempUser(data.user); // sauvegarder les données complètes du serveur
      if (data.firstLogin) {
        // Première connexion → changer le mot de passe obligatoire
        setStep("change"); setNPwd(""); setCPwd("");
      } else {
        setToken(data.token);
        onLogin(data.user); // utiliser data.user (complet, depuis le serveur)
      }
    } catch { setErr("Erreur réseau, réessayez."); }
    setBusy(false);
  };

  const changePwd = async () => {
    setErr("");
    if (nPwd.length < 6) { setErr("6 caractères minimum"); return; }
    if (nPwd !== cPwd) { setErr("Les mots de passe ne correspondent pas"); return; }
    if (nPwd === DEFAULT_PASSWORD) { setErr("Choisissez un autre mot de passe"); return; }
    setBusy(true);
    try {
      const r = await fetch('/api/auth/change-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + tempToken },
        body: JSON.stringify({ newPassword: nPwd }),
      });
      if (!r.ok) { setErr((await r.json()).error || "Erreur"); setBusy(false); return; }
      // Vérifier si l'utilisateur n'a pas encore d'email → étape email
      // Utiliser tempUser (données du serveur) et non sel (DEFAULT_EMPLOYEES incomplet)
      if (!tempUser?.email) { setStep("email"); setEmail(""); }
      else { setToken(tempToken); onLogin(tempUser); }
    } catch { setErr("Erreur réseau"); }
    setBusy(false);
  };

  const saveEmail = async () => {
    setErr("");
    if (!email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) { setErr("Email invalide"); return; }
    setBusy(true);
    try {
      await fetch('/api/auth/set-email', {
        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + tempToken },
        body: JSON.stringify({ email: email.trim() }),
      });
      setToken(tempToken);
      // Utiliser tempUser (complet depuis serveur) + email saisi
      onLogin({ ...tempUser, email: email.trim() });
    } catch { setErr("Erreur réseau"); }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: DARK, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Outfit','Segoe UI',sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
      <style>{"@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}"}</style>
      <div style={{ width: "100%", maxWidth: 460, padding: 24, animation: "fadeUp 0.4s ease" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ marginBottom: 10 }}><Logo size={60} /></div>
          <h1 style={{ color: TXT, fontSize: 22, fontWeight: 800, margin: 0 }}>Kanban Équipe</h1>
          <p style={{ color: TXT3, fontSize: 13, marginTop: 4 }}>
            {step === "select" && "Sélectionnez votre nom pour vous connecter"}
            {step === "password" && ("Connexion — " + (sel && sel.name))}
            {step === "change" && "Première connexion : créez votre mot de passe"}
            {step === "email" && "Ajoutez votre adresse email (récupération de compte)"}
          </p>
        </div>

        {step === "select" && (
          <div>
            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="🔍 Rechercher..." style={{ ...iBase, marginBottom: 10 }} />
            <div style={{ display: "flex", gap: 5, marginBottom: 14 }}>
              {[{ id: "all", l: "Tous" }, { id: "fluide", l: "Fluide" }, { id: "elec", l: "Élec" }, { id: "admin", l: "Super Admin" }, { id: "direction", l: "Admin" }].map((f) => (
                <button key={f.id} onClick={() => setPf(f.id)} style={{ flex: 1, padding: "7px 0", background: pf === f.id ? BLUE + "22" : DARK2, border: "1px solid " + (pf === f.id ? BLUE + "66" : BRD), borderRadius: 7, color: pf === f.id ? BLUE : TXT3, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{f.l}</button>
              ))}
            </div>
            <div style={{ maxHeight: 380, overflowY: "auto", display: "flex", flexDirection: "column", gap: 3 }}>
              {filtered.map((emp) => (
                <button key={emp.name} onClick={() => { setSel(emp); setStep("password"); setPwd(""); setErr(""); setResetDone(false); }}
                  style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 14px", background: DARK2, border: "1px solid " + BRD, borderRadius: 9, cursor: "pointer", textAlign: "left", width: "100%" }}
                  onMouseEnter={(e) => { e.currentTarget.style.background = DARK4; }}
                  onMouseLeave={(e) => { e.currentTarget.style.background = DARK2; }}>
                  <div style={{ width: 36, height: 36, borderRadius: 99, background: emp.isAdmin ? PURPLE + "44" : emp.pole === "Direction" ? GREEN + "44" : emp.isChef ? (emp.pole === "Fluide" ? BLUE : RED) : DARK3, border: "2px solid " + (emp.isAdmin ? PURPLE + "66" : emp.pole === "Direction" ? GREEN + "66" : (emp.pole === "Fluide" ? BLUE : RED) + "44"), display: "flex", alignItems: "center", justifyContent: "center", color: emp.isChef || emp.isAdmin || emp.pole === "Direction" ? "#fff" : TXT2, fontSize: 12, fontWeight: 800, flexShrink: 0 }}>
                    {emp.name.split(" ").map((n) => n[0]).join("").slice(0, 2)}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: TXT, fontSize: 13, fontWeight: 600 }}>{emp.name}</div>
                    <div style={{ color: TXT3, fontSize: 10 }}>{emp.role}</div>
                  </div>
                  {emp.isAdmin && <span style={{ fontSize: 8, padding: "2px 8px", borderRadius: 99, background: PURPLE + "22", color: PURPLE, fontWeight: 700, textTransform: "uppercase" }}>Super Admin</span>}
                  {emp.isChef && !emp.isAdmin && <span style={{ fontSize: 8, padding: "2px 8px", borderRadius: 99, background: ORANGE + "22", color: ORANGE, fontWeight: 700, textTransform: "uppercase" }}>Chef</span>}
                  {emp.pole === "Direction" && <span style={{ fontSize: 8, padding: "2px 8px", borderRadius: 99, background: GREEN + "22", color: GREEN, fontWeight: 700, textTransform: "uppercase" }}>Admin</span>}
                  {!emp.isAdmin && emp.pole !== "Direction" && <span style={{ fontSize: 9, padding: "2px 9px", borderRadius: 99, background: (emp.pole === "Fluide" ? BLUE : RED) + "22", color: emp.pole === "Fluide" ? BLUE : RED, fontWeight: 600 }}>{emp.pole}</span>}
                </button>
              ))}
            </div>
          </div>
        )}

        {step === "password" && (
          <div style={{ animation: "fadeUp 0.3s ease" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", background: DARK2, border: "1px solid " + BRD, borderRadius: 10, marginBottom: 20 }}>
              <div style={{ width: 42, height: 42, borderRadius: 99, background: sel.isAdmin ? PURPLE + "44" : sel.isChef ? (sel.pole === "Fluide" ? BLUE : RED) : DARK3, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 14, fontWeight: 800 }}>
                {sel.name.split(" ").map((n) => n[0]).join("").slice(0, 2)}
              </div>
              <div><div style={{ color: TXT, fontSize: 15, fontWeight: 700 }}>{sel.name}</div><div style={{ color: TXT3, fontSize: 11 }}>{sel.role}</div></div>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={lBase}>Mot de passe</label>
              <input type="password" value={pwd} onChange={(e) => { setPwd(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && checkPwd()} placeholder="Mot de passe" autoFocus style={{ ...iBase, borderColor: err ? RED : BRD, animation: err ? "shake 0.3s" : "none" }} />
            </div>
            {err && <div style={{ color: RED, fontSize: 12, fontWeight: 600, marginBottom: 12 }}>⚠️ {err}</div>}
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setStep("select"); setErr(""); }} style={{ flex: 1, padding: "11px 0", background: DARK2, border: "1px solid " + BRD, borderRadius: 8, color: TXT2, fontWeight: 600, cursor: "pointer" }}>← Retour</button>
              <button onClick={checkPwd} disabled={busy || !pwd} style={{ flex: 2, padding: "11px 0", background: !pwd ? TXT3 : BLUE, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, cursor: pwd ? "pointer" : "not-allowed" }}>Se connecter</button>
            </div>
            {!resetSent ? (
              <div style={{ marginTop: 16 }}>
                <div style={{ padding: "10px 14px", background: BLUE + "11", border: "1px solid " + BLUE + "33", borderRadius: 8, marginBottom: 10 }}>
                  <div style={{ color: BLUE, fontSize: 11, fontWeight: 600 }}>ℹ️ Première connexion ?</div>
                  <div style={{ color: TXT2, fontSize: 11, marginTop: 3 }}>Mot de passe initial : <span style={{ color: TXT, fontWeight: 700, fontFamily: "monospace", background: DARK, padding: "1px 6px", borderRadius: 4 }}>{DEFAULT_PASSWORD}</span></div>
                </div>
                <button onClick={forgotPassword} disabled={busy} style={{ width: "100%", padding: "9px 0", background: "transparent", border: "1px solid " + ORANGE + "44", borderRadius: 8, color: ORANGE, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                  🔑 Mot de passe oublié ? Recevoir un lien par email
                </button>
              </div>
            ) : (
              <div style={{ marginTop: 16, padding: "12px 14px", background: GREEN + "15", border: "1px solid " + GREEN + "44", borderRadius: 8 }}>
                <div style={{ color: GREEN, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>✉️ Lien envoyé !</div>
                <div style={{ color: TXT2, fontSize: 11 }}>Si un email est associé à votre compte, vous recevrez un lien de réinitialisation.</div>
              </div>
            )}
          </div>
        )}

        {step === "change" && (
          <div style={{ animation: "fadeUp 0.3s ease" }}>
            <div style={{ padding: "12px 16px", background: ORANGE + "15", border: "1px solid " + ORANGE + "44", borderRadius: 10, marginBottom: 20, display: "flex", gap: 10 }}>
              <span style={{ fontSize: 20 }}>🔐</span>
              <div><div style={{ color: ORANGE, fontSize: 13, fontWeight: 700 }}>Changement obligatoire</div><div style={{ color: TXT2, fontSize: 11, marginTop: 3 }}>6 caractères minimum</div></div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 16 }}>
              <div><label style={lBase}>Nouveau</label><input type="password" value={nPwd} onChange={(e) => { setNPwd(e.target.value); setErr(""); }} autoFocus style={iBase} /></div>
              <div><label style={lBase}>Confirmer</label><input type="password" value={cPwd} onChange={(e) => { setCPwd(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && changePwd()} style={{ ...iBase, borderColor: cPwd && cPwd !== nPwd ? RED : cPwd && cPwd === nPwd ? GREEN : BRD }} /></div>
            </div>
            {err && <div style={{ color: RED, fontSize: 12, fontWeight: 600, marginBottom: 12 }}>⚠️ {err}</div>}
            <button onClick={changePwd} disabled={busy || !nPwd || !cPwd} style={{ width: "100%", padding: "12px 0", background: nPwd && cPwd && nPwd === cPwd ? GREEN : TXT3, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, cursor: nPwd && cPwd ? "pointer" : "not-allowed" }}>Valider →</button>
          </div>
        )}

        {step === "email" && (
          <div style={{ animation: "fadeUp 0.3s ease" }}>
            <div style={{ padding: "12px 16px", background: BLUE + "15", border: "1px solid " + BLUE + "44", borderRadius: 10, marginBottom: 20, display: "flex", gap: 10 }}>
              <span style={{ fontSize: 20 }}>✉️</span>
              <div>
                <div style={{ color: BLUE, fontSize: 13, fontWeight: 700 }}>Ajoutez votre email</div>
                <div style={{ color: TXT2, fontSize: 11, marginTop: 3 }}>Permettra de réinitialiser votre mot de passe en cas d'oubli.</div>
              </div>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={lBase}>Adresse email</label>
              <input type="email" value={email} onChange={(e) => { setEmail(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && saveEmail()} placeholder="prenom.nom@sozais.com" autoFocus style={iBase} />
            </div>
            {err && <div style={{ color: RED, fontSize: 12, fontWeight: 600, marginBottom: 12 }}>⚠️ {err}</div>}
            <button onClick={saveEmail} disabled={busy || !email} style={{ width: "100%", padding: "12px 0", background: email ? GREEN : TXT3, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, cursor: email ? "pointer" : "not-allowed", marginBottom: 10 }}>Enregistrer et accéder →</button>
            <button onClick={() => { setToken(tempToken); onLogin(tempUser); }} style={{ width: "100%", padding: "9px 0", background: "transparent", border: "1px solid " + BRD, borderRadius: 8, color: TXT3, fontSize: 12, cursor: "pointer" }}>Passer pour l'instant</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Modal ───
function Modal({ task, onSave, onClose, onDelete, poleMembers }) {
  const [f, setF] = useState({
    title: "", project: "", description: "", priority: "medium",
    column: "todo", deadline: "", estimatedHours: "",
    timerSeconds: 0, timerRunning: false, timerStartedAt: null,
    assignedTo: "", ...task
  });

  const save = () => {
    if (!f.title.trim()) return;
    onSave({ ...f, id: f.id || genId(), createdAt: f.createdAt || new Date().toISOString() });
  };

  const secs = liveSeconds(f);
  const est = f.estimatedHours ? parseFloat(f.estimatedHours) : 0;
  const actH = secs / 3600;
  const over = est > 0 && actH > est;
  const pct = est > 0 ? Math.round((actH / est) * 100) : 0;

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: DARK2, border: "1px solid " + BRD, borderRadius: 16, padding: 28, width: "100%", maxWidth: 520, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
          <h2 style={{ color: TXT, fontSize: 18, fontWeight: 700, margin: 0 }}>{task && task.id ? "Modifier" : "Nouvelle tâche"}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", color: TXT3, fontSize: 22, cursor: "pointer" }}>✕</button>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div><label style={lBase}>Titre *</label><input value={f.title} onChange={(e) => setF({ ...f, title: e.target.value })} placeholder="Ex: Étude CVC bâtiment B" style={iBase} /></div>
          <div><label style={lBase}>Projet / Affaire</label><input value={f.project} onChange={(e) => setF({ ...f, project: e.target.value })} placeholder="Ex: Hôpital Tunis Nord" style={iBase} /></div>
          <div><label style={lBase}>Description</label><textarea value={f.description} onChange={(e) => setF({ ...f, description: e.target.value })} rows={2} style={{ ...iBase, resize: "vertical" }} /></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div>
              <label style={lBase}>Priorité</label>
              <div style={{ display: "flex", gap: 4 }}>
                {PRIOS.map((p) => (
                  <button key={p.id} onClick={() => setF({ ...f, priority: p.id })} style={{ flex: 1, padding: "7px 2px", background: f.priority === p.id ? p.color + "22" : DARK, border: "2px solid " + (f.priority === p.id ? p.color : BRD), borderRadius: 6, color: f.priority === p.id ? p.color : TXT3, fontSize: 10, fontWeight: 600, cursor: "pointer" }}>{p.icon} {p.label}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={lBase}>Colonne</label>
              <select value={f.column} onChange={(e) => setF({ ...f, column: e.target.value })} style={iBase}>
                {COLS.map((c) => <option key={c.id} value={c.id}>{c.icon} {c.title}</option>)}
              </select>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div><label style={lBase}>Échéance</label><input type="date" value={f.deadline} onChange={(e) => setF({ ...f, deadline: e.target.value })} style={iBase} /></div>
            <div><label style={lBase}>Heures estimées</label><input type="number" value={f.estimatedHours} onChange={(e) => setF({ ...f, estimatedHours: e.target.value })} min="0" step="0.5" style={iBase} /></div>
          </div>
          {poleMembers && poleMembers.length > 0 && (
            <div>
              <label style={lBase}>Réaffecter à</label>
              <select value={f.assignedTo || ""} onChange={(e) => setF({ ...f, assignedTo: e.target.value })} style={iBase}>
                <option value="">— Garder l'affectation actuelle —</option>
                {poleMembers.map((m) => <option key={m.name} value={m.name}>{m.name} — {m.role}</option>)}
              </select>
              {f.assignedTo && (
                <div style={{ marginTop: 6, padding: "8px 12px", background: ORANGE + "15", border: "1px solid " + ORANGE + "44", borderRadius: 8, color: ORANGE, fontSize: 11, fontWeight: 600 }}>
                  ⚠️ La tâche sera déplacée vers le tableau de {f.assignedTo}
                </div>
              )}
            </div>
          )}
          {task && task.id && secs > 0 && (
            <div style={{ padding: "14px 16px", background: DARK, borderRadius: 10, border: "1px solid " + BRD }}>
              <div style={{ color: TXT3, fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>⏱ Temps passé</div>
              <div style={{ color: TXT, fontSize: 26, fontWeight: 800, fontFamily: "monospace", letterSpacing: 2 }}>{fmtTime(secs)}</div>
              <div style={{ color: TXT3, fontSize: 11, marginTop: 4 }}>{fmtH(secs)}h réalisées{est > 0 ? (" sur " + est + "h estimées") : ""}</div>
              {est > 0 && (
                <div>
                  <div style={{ width: "100%", height: 6, background: DARK2, borderRadius: 99, overflow: "hidden", marginTop: 8 }}>
                    <div style={{ width: Math.min(pct, 100) + "%", height: "100%", borderRadius: 99, background: over ? RED : pct > 80 ? ORANGE : GREEN }} />
                  </div>
                  <div style={{ color: over ? RED : pct > 80 ? ORANGE : GREEN, fontSize: 11, fontWeight: 600, marginTop: 4 }}>
                    {over ? ("⚠️ Dépassement +" + (actH - est).toFixed(1) + "h (+" + (pct - 100) + "%)") : (pct + "% — reste " + (est - actH).toFixed(1) + "h")}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "flex-end" }}>
          {task && task.id && onDelete && (
            <button onClick={() => onDelete(task.id)} style={{ padding: "9px 18px", background: RED + "22", border: "1px solid " + RED + "44", borderRadius: 8, color: RED, fontWeight: 600, cursor: "pointer", marginRight: "auto" }}>Supprimer</button>
          )}
          <button onClick={onClose} style={{ padding: "9px 18px", background: DARK, border: "1px solid " + BRD, borderRadius: 8, color: TXT2, fontWeight: 600, cursor: "pointer" }}>Annuler</button>
          <button onClick={save} style={{ padding: "9px 22px", background: BLUE, border: "none", borderRadius: 8, color: "#fff", fontWeight: 600, cursor: "pointer" }}>{task && task.id ? "OK" : "Créer"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Card ───
function Card({ task, onClick, owner, onTimerToggle, onDuplicate, onReassignDirect, poleMembers, tick }) {
  const p = PRIOS.find((x) => x.id === task.priority);
  const secs = liveSeconds(task);
  const est = task.estimatedHours ? parseFloat(task.estimatedHours) : 0;
  const actH = secs / 3600;
  const over = est > 0 && actH > est;
  const pct = est > 0 ? Math.min(Math.round((actH / est) * 100), 999) : 0;
  const od = task.deadline && new Date(task.deadline) < new Date() && task.column !== "done";

  return (
    <div
      draggable
      onDragStart={(e) => { dragData = { taskId: task.id, owner }; e.currentTarget.style.opacity = "0.4"; }}
      onDragEnd={(e) => { e.currentTarget.style.opacity = "1"; dragData = null; }}
      style={{ background: DARK3, border: "1px solid " + (task.timerRunning ? CYAN + "66" : BRD), borderLeft: "3px solid " + (task.timerRunning ? CYAN : (p ? p.color : TXT3)), borderRadius: 10, padding: "11px 13px", cursor: "grab", position: "relative" }}
      onMouseEnter={(e) => { e.currentTarget.style.background = DARK4; }}
      onMouseLeave={(e) => { e.currentTarget.style.background = DARK3; }}
    >
      {task.timerRunning && <div style={{ position: "absolute", top: 6, right: 8, width: 7, height: 7, borderRadius: 99, background: CYAN, animation: "pulse 1.5s infinite" }} />}
      <div onClick={() => onClick(task)} style={{ cursor: "pointer" }}>
        {task.project && <div style={{ fontSize: 9, fontWeight: 700, color: BLUE, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 5 }}>{task.project}</div>}
        <div style={{ color: TXT, fontSize: 13, fontWeight: 600, lineHeight: 1.4, marginBottom: 6 }}>{task.title}</div>
      </div>
      {poleMembers && poleMembers.length > 0 && (
        <div style={{ marginBottom: 7 }} onClick={(e) => e.stopPropagation()}>
          <select
            defaultValue=""
            onChange={(e) => { if (e.target.value) { onReassignDirect(task, e.target.value); e.target.value = ""; } }}
            style={{ width: "100%", padding: "4px 8px", background: DARK, border: "1px solid " + BRD, borderRadius: 6, color: TXT3, fontSize: 10, cursor: "pointer", outline: "none" }}
          >
            <option value="">👤 Réaffecter…</option>
            {poleMembers.map((m) => <option key={m.name} value={m.name}>{m.name}</option>)}
          </select>
        </div>
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap", marginBottom: 6 }}>
        <span style={{ fontSize: 9, padding: "2px 7px", borderRadius: 99, background: (p ? p.color : TXT3) + "22", color: p ? p.color : TXT3, fontWeight: 600 }}>{p ? p.icon : ""} {p ? p.label : ""}</span>
        {task.deadline && <span style={{ fontSize: 9, color: od ? RED : TXT3, fontWeight: od ? 700 : 400 }}>{od ? "⚠️" : "📅"} {new Date(task.deadline).toLocaleDateString("fr-FR", { day: "numeric", month: "short" })}</span>}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <button onClick={(e) => { e.stopPropagation(); onDuplicate(task); }}
          style={{ width: 28, height: 28, borderRadius: 99, background: PURPLE + "22", border: "2px solid " + PURPLE + "55", color: PURPLE, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}
          title="Dupliquer">⧉</button>
        <button onClick={(e) => { e.stopPropagation(); onTimerToggle(task.id); }}
          style={{ width: 28, height: 28, borderRadius: 99, background: task.timerRunning ? RED + "22" : GREEN + "22", border: "2px solid " + (task.timerRunning ? RED + "66" : GREEN + "66"), color: task.timerRunning ? RED : GREEN, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}
          title={task.timerRunning ? "Pause" : "Démarrer"}>{task.timerRunning ? "⏸" : "▶"}</button>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 12, fontFamily: "monospace", color: task.timerRunning ? CYAN : TXT2, fontWeight: 700, letterSpacing: 1 }}>{fmtTime(secs)}</span>
            {est > 0 && <span style={{ fontSize: 9, color: over ? RED : pct > 80 ? ORANGE : TXT3 }}>{fmtH(secs)}/{est}h</span>}
          </div>
          {est > 0 && <div style={{ width: "100%", height: 3, background: DARK, borderRadius: 99, overflow: "hidden", marginTop: 3 }}><div style={{ width: Math.min(pct, 100) + "%", height: "100%", borderRadius: 99, background: over ? RED : pct > 80 ? ORANGE : GREEN, transition: "width 0.3s" }} /></div>}
        </div>
      </div>
    </div>
  );
}

// ─── Column ───
function KCol({ col, tasks, owner, onAdd, onEdit, onDrop, ro, onTimerToggle, onDuplicate, tick }) {
  const [ov, setOv] = useState(false);
  const ct = tasks.filter((t) => t.column === col.id);
  return (
    <div style={{ flex: 1, minWidth: 210, maxWidth: 270, display: "flex", flexDirection: "column" }}
      onDragOver={(e) => { e.preventDefault(); setOv(true); }}
      onDragLeave={() => setOv(false)}
      onDrop={(e) => { e.preventDefault(); setOv(false); if (dragData && dragData.owner === owner) onDrop(dragData.taskId, col.id); dragData = null; }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 10px", marginBottom: 8, borderBottom: "2px solid " + col.color }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>{col.icon}</span>
          <span style={{ color: TXT, fontSize: 12, fontWeight: 700 }}>{col.title}</span>
          <span style={{ background: col.color + "33", color: col.color, fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 99 }}>{ct.length}</span>
        </div>
        {!ro && col.id !== "done" && <button onClick={() => onAdd(col.id)} style={{ background: "none", border: "none", color: TXT3, fontSize: 18, cursor: "pointer" }}>+</button>}
      </div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 7, padding: 2, borderRadius: 8, minHeight: 80, background: ov ? col.color + "11" : "transparent", border: ov ? "1px dashed " + col.color + "55" : "1px dashed transparent" }}>
        {ct.map((t) => (
          <Card key={t.id} task={t} onClick={ro ? () => {} : onEdit} owner={owner} onTimerToggle={ro ? () => {} : onTimerToggle} onDuplicate={ro ? () => {} : onDuplicate} tick={tick} />
        ))}
      </div>
    </div>
  );
}

// ─── Board ───
function Board({ name, tasks, onUpdate, ro, showName, onToggleTimer, tick, poleMembers, onReassign, onPrioritize, prioritizing }) {
  const [modal, setModal] = useState(null);

  const del = (id) => { onUpdate(name, tasks.filter((t) => t.id !== id)); setModal(null); };
  const drop = (tid, nc) => { onUpdate(name, tasks.map((t) => t.id === tid ? { ...t, column: nc } : t)); };
  const dup = (t) => {
    const copy = { ...t, id: genId(), title: t.title + " (copie)", timerSeconds: 0, timerRunning: false, timerStartedAt: null, createdAt: new Date().toISOString() };
    onUpdate(name, [...tasks, copy]);
  };

  const save = (t) => {
    const target = t.assignedTo && t.assignedTo !== name ? t.assignedTo : null;
    const { assignedTo, ...rest } = t;
    const clean = { ...rest, id: rest.id || genId(), createdAt: rest.createdAt || new Date().toISOString() };
    if (target && onReassign) {
      onReassign(name, target, clean);
    } else {
      const ex = tasks.find((x) => x.id === clean.id);
      onUpdate(name, ex ? tasks.map((x) => x.id === clean.id ? clean : x) : [...tasks, clean]);
    }
    setModal(null);
  };

  const reassignDirect = (task, toName) => {
    if (onReassign) onReassign(name, toName, { ...task, assignedTo: undefined });
  };

  const emptyTask = { title: "", project: "", description: "", priority: "medium", deadline: "", estimatedHours: "", timerSeconds: 0, timerRunning: false, timerStartedAt: null, assignedTo: "" };

  return (
    <div>
      {showName && (
        <div style={{ padding: "10px 16px", marginBottom: 8, borderRadius: 10, background: DARK2, border: "1px solid " + BRD, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <div style={{ width: 32, height: 32, borderRadius: 99, background: BLUE + "22", display: "flex", alignItems: "center", justifyContent: "center", color: BLUE, fontSize: 11, fontWeight: 800, flexShrink: 0 }}>{name.split(" ").map((n) => n[0]).join("").slice(0, 2)}</div>
          <span style={{ color: TXT, fontWeight: 700, fontSize: 14 }}>{name}</span>
          <span style={{ color: TXT3, fontSize: 12 }}>— {tasks.length} tâche{tasks.length !== 1 ? "s" : ""}</span>
          {tasks.some((t) => t.timerRunning) && <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 99, background: CYAN + "22", color: CYAN, fontWeight: 700, animation: "pulse 1.5s infinite" }}>⏱ En cours</span>}
          {onPrioritize && (
            <button
              onClick={() => onPrioritize(name)}
              disabled={prioritizing === name}
              style={{ marginLeft: "auto", padding: "5px 12px", background: prioritizing === name ? TXT3 : PURPLE + "22", border: "1px solid " + (prioritizing === name ? TXT3 : PURPLE + "66"), borderRadius: 7, color: prioritizing === name ? TXT3 : PURPLE, fontSize: 11, fontWeight: 700, cursor: prioritizing === name ? "not-allowed" : "pointer", display: "flex", alignItems: "center", gap: 5 }}>
              {prioritizing === name ? "⏳ Priorisation..." : "🤖 Prioriser"}
            </button>
          )}
        </div>
      )}
      <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 8 }}>
        {COLS.map((c) => (
          <KCol key={c.id} col={c} tasks={tasks} owner={name}
            onAdd={(cid) => setModal({ ...emptyTask, column: cid })}
            onEdit={(t) => setModal({ ...t, assignedTo: "" })}
            onDrop={drop} ro={ro}
            onTimerToggle={(tid) => onToggleTimer(name, tid)}
            onDuplicate={dup}
            onReassignDirect={reassignDirect}
            poleMembers={poleMembers}
            tick={tick}
          />
        ))}
      </div>
      {modal && (
        <Modal
          task={modal.id ? modal : modal}
          onSave={save}
          onClose={() => setModal(null)}
          onDelete={modal.id ? del : undefined}
          poleMembers={modal.id ? poleMembers : null}
        />
      )}
    </div>
  );
}

// ─── Settings ───
function SettingsModal({ user, onClose }) {
  const [tab, setTab] = useState("password"); // "password" | "email"
  const [np, setNp] = useState(""); const [cp, setCp] = useState("");
  const [emailVal, setEmailVal] = useState(user.email || "");
  const [msg, setMsg] = useState(""); const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const changePwd = async () => {
    setErr(""); setMsg(""); setBusy(true);
    if (np.length < 6) { setErr("6 car. min"); setBusy(false); return; }
    if (np !== cp) { setErr("Ne correspond pas"); setBusy(false); return; }
    const r = await authFetch('/api/auth/change-password', { method: 'POST', body: JSON.stringify({ newPassword: np }) });
    setBusy(false);
    if (r.ok) { setMsg("✓ Mot de passe modifié !"); setNp(""); setCp(""); }
    else { setErr((await r.json()).error || "Erreur"); }
  };

  const saveEmail = async () => {
    setErr(""); setMsg(""); setBusy(true);
    if (!emailVal.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal.trim())) { setErr("Email invalide"); setBusy(false); return; }
    const r = await authFetch('/api/auth/set-email', { method: 'POST', body: JSON.stringify({ email: emailVal.trim() }) });
    setBusy(false);
    if (r.ok) setMsg("✓ Email enregistré !");
    else setErr((await r.json()).error || "Erreur");
  };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: DARK2, border: "1px solid " + BRD, borderRadius: 16, padding: 28, width: "100%", maxWidth: 400 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
          <h2 style={{ color: TXT, fontSize: 18, fontWeight: 700, margin: 0 }}>⚙️ Mon compte</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", color: TXT3, fontSize: 22, cursor: "pointer" }}>✕</button>
        </div>
        {/* Tabs */}
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {[{ id: "password", l: "🔐 Mot de passe" }, { id: "email", l: "✉️ Email" }].map((t) => (
            <button key={t.id} onClick={() => { setTab(t.id); setErr(""); setMsg(""); }} style={{ flex: 1, padding: "8px 0", background: tab === t.id ? BLUE + "22" : DARK3, border: "1px solid " + (tab === t.id ? BLUE + "66" : BRD), borderRadius: 8, color: tab === t.id ? BLUE : TXT2, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{t.l}</button>
          ))}
        </div>
        {tab === "password" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div><label style={lBase}>Nouveau mot de passe</label><input type="password" value={np} onChange={(e) => { setNp(e.target.value); setErr(""); setMsg(""); }} autoFocus style={iBase} /></div>
            <div><label style={lBase}>Confirmer</label><input type="password" value={cp} onChange={(e) => { setCp(e.target.value); setErr(""); setMsg(""); }} onKeyDown={(e) => e.key === "Enter" && changePwd()} style={{ ...iBase, borderColor: cp && cp !== np ? RED : cp && cp === np ? GREEN : BRD }} /></div>
            {err && <div style={{ color: RED, fontSize: 12, fontWeight: 600 }}>⚠️ {err}</div>}
            {msg && <div style={{ color: GREEN, fontSize: 12, fontWeight: 600 }}>{msg}</div>}
            <button onClick={changePwd} disabled={busy || !np || !cp} style={{ padding: "11px 0", background: BLUE, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Modifier</button>
          </div>
        )}
        {tab === "email" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div><label style={lBase}>Adresse email</label><input type="email" value={emailVal} onChange={(e) => { setEmailVal(e.target.value); setErr(""); setMsg(""); }} autoFocus style={iBase} placeholder="prenom.nom@sozais.com" /></div>
            {err && <div style={{ color: RED, fontSize: 12, fontWeight: 600 }}>⚠️ {err}</div>}
            {msg && <div style={{ color: GREEN, fontSize: 12, fontWeight: 600 }}>{msg}</div>}
            <button onClick={saveEmail} disabled={busy || !emailVal} style={{ padding: "11px 0", background: BLUE, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Enregistrer</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── FixedCostsModal (admin only) ─────────────────────────────

  const [costs, setCosts] = useState(null);

    authFetch('/api/fixed-costs').then((r) => r.json()).then(setCosts).catch(() => setCosts([]));

  const update = (cat, val) => setCosts(costs.map((c) => c.category === cat ? { ...c, amount_monthly: val } : c));

  const save = async () => {
    setSaving(true);

      await authFetch('/api/fixed-costs', {
        method: 'POST',

      });

      setTimeout(onClose, 900);

          <div style={{ color: TXT2, textAlign: 'center', padding: 24 }}>Chargement…</div>

              <div key={c.category} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', background: DARK3, borderRadius: 8, border: '1px solid ' + BRD }}>

                  <div style={{ color: TXT, fontSize: 13, fontWeight: 600 }}>{c.label}</div>
                  <div style={{ color: TXT3, fontSize: 10, textTransform: 'uppercase', letterSpacing: 1 }}>{c.category.replace('_', ' ')}</div>

                  />
                  <span style={{ color: TXT3, fontSize: 12 }}>€/mois</span>
                </div>
              </div>
            ))}
            <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', padding: '8px 14px', background: DARK3, borderRadius: 8, border: '1px solid ' + GREEN + '44' }}>
              <span style={{ color: TXT2, fontSize: 12, marginRight: 12 }}>Total mensuel</span>
              <span style={{ color: GREEN, fontSize: 18, fontWeight: 800 }}>{total.toLocaleString('fr-FR')} €</span>
            </div>
          </div>
        )}

        <div style={{ display: 'flex', gap: 10, marginTop: 20, justifyContent: 'flex-end' }}>
          <button onClick={onClose} style={{ padding: '9px 18px', background: DARK, border: '1px solid ' + BRD, borderRadius: 8, color: TXT2, fontWeight: 600, cursor: 'pointer' }}>Annuler</button>
          <button onClick={save} disabled={saving || !costs} style={{ padding: '9px 22px', background: saved ? GREEN : BLUE, border: 'none', borderRadius: 8, color: '#fff', fontWeight: 600, cursor: 'pointer' }}>
            {saved ? '✅ Enregistré' : saving ? 'Sauvegarde…' : '💾 Enregistrer'}
          </button>
        </div>
      </div>
    </div>
  );
}

  const reload = () => {
    setLoading(true);
    authFetch('/api/profitability').then((r) => r.json()).then((d) => { setData(d); setLoading(false); }).catch(() => setLoading(false));
  };
  useEffect(() => reload(), []);

  const startEdit = (p) => setEditing({ project: p.project, revenue_forfait: p.ca_forfait, revenue_mode: p.revenue_mode });

  const saveProject = async () => {
    setSaving(true);
    await authFetch('/api/projects', {
      method: 'POST',
      body: JSON.stringify({ name: editing.project, revenue_forfait: parseFloat(editing.revenue_forfait) || 0, revenue_mode: editing.revenue_mode }),
    });
    setSaving(false);
    setEditing(null);
    reload();
  };

  const fmt = (v) => v != null ? v.toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' €' : '—';
  const fmtPct = (v) => v != null ? v.toFixed(1) + ' %' : '—';

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: DARK2, border: '1px solid ' + BRD, borderRadius: 16, padding: 28, width: '100%', maxWidth: 900, maxHeight: '88vh', overflowY: 'auto' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 20 }}>
          <h2 style={{ color: TXT, fontSize: 18, fontWeight: 700, margin: 0 }}>💰 Rentabilité par projet</h2>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: TXT3, fontSize: 22, cursor: 'pointer' }}>✕</button>
        </div>

        {loading ? (
          <div style={{ color: TXT2, textAlign: 'center', padding: 40 }}>Calcul en cours…</div>
        ) : !data ? (
          <div style={{ color: RED, textAlign: 'center', padding: 40 }}>Erreur de chargement.</div>
        ) : (
          <>
            {/* Résumé frais fixes */}
            <div style={{ display: 'flex', gap: 12, marginBottom: 18, flexWrap: 'wrap' }}>
              {(data.fixed_costs || []).map((c) => (
                <div key={c.category} style={{ padding: '8px 14px', background: DARK3, borderRadius: 8, border: '1px solid ' + BRD, minWidth: 120 }}>
                  <div style={{ color: TXT3, fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1 }}>{c.label}</div>
                  <div style={{ color: ORANGE, fontSize: 14, fontWeight: 700, marginTop: 2 }}>{(parseFloat(c.amount_monthly) || 0).toLocaleString('fr-FR')} €/mois</div>
                </div>
              ))}
              <div style={{ padding: '8px 14px', background: DARK3, borderRadius: 8, border: '1px solid ' + RED + '55', minWidth: 120 }}>
                <div style={{ color: TXT3, fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1 }}>Total frais fixes</div>
                <div style={{ color: RED, fontSize: 14, fontWeight: 800, marginTop: 2 }}>{(data.total_fixed_monthly || 0).toLocaleString('fr-FR')} €/mois</div>
              </div>
            </div>

            {/* Table des projets */}
            {data.projects.length === 0 ? (
              <div style={{ color: TXT3, textAlign: 'center', padding: 32, fontSize: 13 }}>
                Aucun projet avec des tâches trackées.<br/>
                <span style={{ color: TXT3, fontSize: 11 }}>Importez des livrables et activez le timer pour voir la rentabilité.</span>
              </div>
            ) : (
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid ' + BRD }}>
                      {['Projet', 'Heures', 'Coût MO', 'CA (retenu)', 'Mode', 'Marge', 'Marge %', 'Tâches', ''].map((h) => (
                        <th key={h} style={{ padding: '8px 10px', color: TXT3, fontWeight: 700, fontSize: 10, textTransform: 'uppercase', letterSpacing: 0.5, textAlign: h === 'Heures' || h === 'Tâches' ? 'center' : 'left' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {data.projects.map((p) => {
                      const positive = p.marge_brute >= 0;
                      return (
                        <tr key={p.project} style={{ borderBottom: '1px solid ' + BRD + '55' }}>
                          <td style={{ padding: '10px 10px', color: TXT, fontWeight: 600, maxWidth: 200 }}>
                            <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.project}</div>
                            <div style={{ color: TXT3, fontSize: 10 }}>{p.nb_collaborateurs} collaborateur{p.nb_collaborateurs > 1 ? 's' : ''}</div>
                          </td>
                          <td style={{ padding: '10px 10px', color: TXT2, textAlign: 'center' }}>{p.heures.toFixed(1)}h</td>
                          <td style={{ padding: '10px 10px', color: ORANGE }}>{fmt(p.cout_mo)}</td>
                          <td style={{ padding: '10px 10px', color: TXT }}>{fmt(p.ca_retenu)}</td>
                          <td style={{ padding: '10px 10px' }}>
                            <span style={{ fontSize: 9, padding: '2px 7px', borderRadius: 99, background: p.revenue_mode === 'livrables' ? CYAN + '22' : BLUE + '22', color: p.revenue_mode === 'livrables' ? CYAN : BLUE, fontWeight: 700, textTransform: 'uppercase' }}>
                              {p.revenue_mode === 'livrables' ? 'Livrables' : 'Forfait'}
                            </span>
                          </td>
                          <td style={{ padding: '10px 10px', color: positive ? GREEN : RED, fontWeight: 700 }}>{fmt(p.marge_brute)}</td>
                          <td style={{ padding: '10px 10px', color: positive ? GREEN : RED }}>{fmtPct(p.marge_pct)}</td>
                          <td style={{ padding: '10px 10px', color: TXT3, textAlign: 'center' }}>{p.nb_taches}</td>
                          <td style={{ padding: '10px 6px' }}>
                            <button onClick={() => startEdit(p)} style={{ padding: '4px 10px', background: DARK3, border: '1px solid ' + BRD, borderRadius: 6, color: TXT2, fontSize: 10, cursor: 'pointer' }}>✏️ CA</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{ borderTop: '2px solid ' + BRD }}>
                      <td style={{ padding: '10px 10px', color: TXT, fontWeight: 800, fontSize: 13 }}>Total</td>
                      <td style={{ padding: '10px 10px', color: TXT2, textAlign: 'center', fontWeight: 700 }}>{data.projects.reduce((s, p) => s + p.heures, 0).toFixed(1)}h</td>
                      <td style={{ padding: '10px 10px', color: ORANGE, fontWeight: 700 }}>{fmt(data.projects.reduce((s, p) => s + p.cout_mo, 0))}</td>
                      <td style={{ padding: '10px 10px', color: TXT, fontWeight: 700 }}>{fmt(data.projects.reduce((s, p) => s + p.ca_retenu, 0))}</td>
                      <td /><td /><td />
                      <td style={{ padding: '10px 10px', color: TXT3, textAlign: 'center', fontWeight: 700 }}>{data.projects.reduce((s, p) => s + p.nb_taches, 0)}</td>
                      <td />
                    </tr>
                  </tfoot>
                </table>
              </div>
            )}
          </>
        )}

        {/* Modale d'édition CA d'un projet */}
        {editing && (
          <div onClick={() => setEditing(null)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2000 }}>
            <div onClick={(e) => e.stopPropagation()} style={{ background: DARK2, border: '1px solid ' + BRD, borderRadius: 14, padding: 24, width: 380 }}>
              <div style={{ color: TXT, fontWeight: 700, fontSize: 15, marginBottom: 16 }}>✏️ CA — {editing.project.length > 40 ? editing.project.slice(0, 40) + '…' : editing.project}</div>

                <label style={lBase}>Mode de facturation</label>
                <select value={editing.revenue_mode} onChange={(e) => setEditing({ ...editing, revenue_mode: e.target.value })} style={iBase}>

                  <option value="livrables">Livrables (somme Equivalent €)</option>
                </select>
              </div>
              {editing.revenue_mode === 'forfait' && (
                <div style={{ marginBottom: 14 }}>
                  <label style={lBase}>Montant forfait (€)</label>

              )}
              <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
                <button onClick={() => setEditing(null)} style={{ padding: '8px 16px', background: DARK, border: '1px solid ' + BRD, borderRadius: 8, color: TXT2, fontWeight: 600, cursor: 'pointer' }}>Annuler</button>
                <button onClick={saveProject} disabled={saving} style={{ padding: '8px 18px', background: BLUE, border: 'none', borderRadius: 8, color: '#fff', fontWeight: 600, cursor: 'pointer' }}>{saving ? 'Sauvegarde…' : '💾 Enregistrer'}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── EmployeesModal (admin only) ───
function EmployeesModal({ employees, onSave, onClose }) {
  const POLES = ["Fluide", "Élec"];

  const [resetMsg, setResetMsg] = useState("");
  const adminList = employees.filter((e) => e.isAdmin);
  const directionList = employees.filter((e) => e.pole === "Direction");

  const resetPassword = async (name) => {
    if (!window.confirm(`Réinitialiser le mot de passe de "${name}" ? Il devra se reconnecter avec "kanban2026".`)) return;
    try {
      const r = await authFetch(`/api/auth/reset/${encodeURIComponent(name)}`, { method: "DELETE" });
      const data = await r.json();
      if (data.ok) {
        setResetMsg(`✅ Mot de passe de "${name}" réinitialisé. Mot de passe provisoire : kanban2026`);
        setTimeout(() => setResetMsg(""), 5000);
      } else {
        setResetMsg(`❌ Erreur : ${data.error}`);
      }
    } catch (e) {
      setResetMsg(`❌ Erreur réseau`);
    }
  };

  const add = () => {
    setErr("");
    if (!form.name.trim()) { setErr("Nom requis"); return; }
    if (!form.role.trim()) { setErr("Rôle requis"); return; }
    if (list.find((e) => e.name.toLowerCase() === form.name.trim().toLowerCase())) { setErr("Ce nom existe déjà"); return; }
    setList([...list, { name: form.name.trim(), role: form.role.trim(), pole: form.pole, isChef: form.isChef, isAdmin: false, tjm: parseFloat(form.tjm) || 0 }]);
    setForm({ name: "", role: "", pole: "Fluide", isChef: false, tjm: "" });

  const remove = (name) => setList(list.filter((e) => e.name !== name));

  const save = () => {

  const byPole = (p) => list.filter((e) => e.pole === p);

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: DARK2, border: "1px solid " + BRD, borderRadius: 16, padding: 28, width: "100%", maxWidth: 600, maxHeight: "90vh", overflowY: "auto" }}>

        </div>

        {/* Liste par pôle */}
        {POLES.map((pole) => (
          <div key={pole} style={{ marginBottom: 18 }}>
            <div style={{ color: pole === "Fluide" ? BLUE : RED, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
              {pole === "Fluide" ? "💧" : "⚡"} Pôle {pole} — {byPole(pole).length} membre{byPole(pole).length !== 1 ? "s" : ""}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {byPole(pole).map((emp) => (
                <div key={emp.name} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: DARK3, borderRadius: 8, border: "1px solid " + BRD }}>
                  <div style={{ width: 30, height: 30, borderRadius: 99, background: emp.isChef ? (pole === "Fluide" ? BLUE : RED) + "33" : DARK4, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: emp.isChef ? (pole === "Fluide" ? BLUE : RED) : TXT2, flexShrink: 0 }}>
                    {emp.name.split(" ").map((n) => n[0]).join("").slice(0, 2)}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: TXT, fontSize: 12, fontWeight: 600 }}>{emp.name}</div>
                    <div style={{ color: TXT3, fontSize: 10 }}>{emp.role}{emp.isChef ? " — Chef" : ""}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>

                    {emp.name.split(" ").map((n) => n[0]).join("").slice(0, 2)}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ color: TXT, fontSize: 12, fontWeight: 600 }}>{emp.name}</div>
                    <div style={{ color: TXT3, fontSize: 10 }}>{emp.role} — {emp.canViewAll ? "Accès complet" : emp.canViewKPI ? "KPI uniquement" : emp.canViewTJM ? "TJM / Rentabilité" : ""}</div>
                  </div>
                  <button onClick={() => resetPassword(emp.name)} title="Réinitialiser le mot de passe" style={{ background: GREEN + "22", border: "1px solid " + GREEN + "44", borderRadius: 6, color: GREEN, fontSize: 11, fontWeight: 700, padding: "4px 10px", cursor: "pointer" }}>🔑 Reset</button>

              ))}

        )}

        {/* Admins — reset uniquement */}
        {adminList.length > 0 && (
          <div style={{ marginBottom: 18 }}>
            <div style={{ color: ORANGE, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>

            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {adminList.map((emp) => (
                <div key={emp.name} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: DARK3, borderRadius: 8, border: "1px solid " + ORANGE + "44" }}>

                    <div style={{ color: TXT, fontSize: 12, fontWeight: 600 }}>{emp.name}</div>

// ─── KPI : Étoiles de notation ───────────────────────────────
function StarRating({ value, onChange, readonly }) {
  const labels = ["", "Insuffisant", "À améliorer", "Satisfaisant", "Bien", "Excellent"];
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
      {[1,2,3,4,5].map(s => (
        <span key={s} onClick={() => !readonly && onChange(s === value ? 0 : s)}
          title={labels[s]}
          style={{ fontSize: 20, cursor: readonly ? "default" : "pointer", color: s <= value ? "#FFB347" : "#334477",
            transition: "color 0.15s", userSelect: "none" }}>★</span>
      ))}
      {value > 0 && <span style={{ color: "#FFB347", fontSize: 11, fontWeight: 700, marginLeft: 4 }}>{labels[value]}</span>}
    </div>
  );
}

// ─── KPI : Modal Évaluation ───────────────────────────────────
function KPIEvalModal({ evaluator, evaluated, criteria, onClose, onSaved }) {
  const [scores, setScores] = useState({});
  const [comment, setComment] = useState("");
  const MONTHS_FR=["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  const [period, setPeriod] = useState(() => {
    const d = new Date();
    return d.getFullYear()+"-"+["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"][d.getMonth()];
  });
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState(false);

  const activeCriteria = criteria.filter(c => c.active);
  const categories = [...new Set(activeCriteria.map(c => c.category))];
  const filled = Object.values(scores).filter(v => v > 0).length;
  const avg = filled ? (Object.values(scores).filter(v=>v>0).reduce((a,b)=>a+b,0)/filled).toFixed(1) : "—";

  const save = async () => {
    setSaving(true);
    await authFetch("/api/kpi/evaluate", {
      method: "POST",
      body: JSON.stringify({ evaluator_name: evaluator.name, evaluated_name: evaluated.name, period, scores, overall_comment: comment })
    });
    setSaving(false); setDone(true);
    setTimeout(() => { onSaved(); onClose(); }, 1500);
  };

  if (done) return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000 }}>
      <div style={{ background:DARK2,border:"1px solid "+GREEN,borderRadius:16,padding:40,textAlign:"center" }}>
