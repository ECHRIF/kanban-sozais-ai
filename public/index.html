function exportToExcel(allTasks, empList) {
  const BOM = "\uFEFF";
  const SEP = ";";
  const colLabel = { backlog: "Backlog", todo: "脙聙 faire", in_progress: "En cours", review: "En revue", done: "Termin脙漏" };
  const prioLabel = { high: "Haute", medium: "Moyenne", low: "Basse" };
  const headers = ["Collaborateur", "P脙麓le", "R脙麓le", "Titre", "Projet", "Description", "Priorit脙漏", "Colonne", "脙聣ch脙漏ance", "H. estim脙漏es", "H. r脙漏alis脙漏es", "D脙漏passement", "Timer", "TJM (芒聜卢/j)", "Co脙禄t MO (芒聜卢)", "CA livrable (芒聜卢)"];
  const rows = [];
  Object.entries(allTasks).forEach(([ownerName, tasks]) => {
    const emp = empList.find((e) => e.name === ownerName);
    const tjm = emp ? (parseFloat(emp.tjm) || 0) : 0;
    tasks.forEach((t) => {
      const secs = t.timerSeconds || 0;
      const est = t.estimatedHours ? parseFloat(t.estimatedHours) : 0;
      const actH = secs / 3600;
      const over = est > 0 && actH > est;
      const coutMO = tjm > 0 ? (actH / 8 * tjm).toFixed(2) : "";
      rows.push([
        ownerName,
        emp ? emp.pole : "",
        emp ? emp.role : "",
        t.title || "",
        t.project || "",
        t.description || "",
        prioLabel[t.priority] || t.priority || "",
        colLabel[t.column] || t.column || "",
        t.deadline || "",
        est > 0 ? est.toFixed(1) : "",
        actH > 0 ? actH.toFixed(2) : "",
        over ? ("+" + (actH - est).toFixed(1) + "h") : "",
        t.timerRunning ? "En cours" : "",
        tjm > 0 ? tjm.toFixed(2) : "",
        coutMO,
        t.revenueAmount > 0 ? parseFloat(t.revenueAmount).toFixed(2) : "",
      ]);
    });
  });
  const escape = (v) => '"' + String(v).replace(/"/g, '""') + '"';
  const csv = BOM + [headers.map(escape).join(SEP), ...rows.map((r) => r.map(escape).join(SEP))].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kanban-export-" + new Date().toISOString().slice(0, 10) + ".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// 芒聰聙芒聰聙芒聰聙 Composant : Import Excel 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function ImportExcelModal({ employees, allTasks, onImport, onClose }) {
  const [step, setStep] = useState('upload');
  const [sheetNames, setSheetNames] = useState([]);
  const [selectedSheet, setSelectedSheet] = useState('');
  const [tasks, setTasks] = useState([]);
  const [lots, setLots] = useState([]);
  const [lotAssign, setLotAssign] = useState({});
  const [defaultAssign, setDefaultAssign] = useState('');
  const [importing, setImporting] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const wbRef = useRef(null);
  const fileRef = useRef(null);

  const staffList = employees.filter((e) => !e.isAdmin);

  // 芒聰聙芒聰聙 Parser une feuille depuis le workbook 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const parseSheet = (wb, sheetName) => {
    const ws = wb.Sheets[sheetName];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });

    // Trouver la ligne de headers dynamiquement
    let hdrIdx = -1;
    const colMap = {};
    for (let i = 0; i < Math.min(raw.length, 25); i++) {
      const row = raw[i] || [];
      const titleCol = row.findIndex((c) => c && String(c).toLowerCase().includes('titre du document'));
      if (titleCol >= 0) {
        hdrIdx = i;
        row.forEach((c, ci) => {
          if (!c) return;
          const s = String(c).toLowerCase().trim();
          if (s === 'phase')                                         colMap.phase  = ci;
          else if (s === 'lot')                                      colMap.lot    = ci;
          else if (s === 'type')                                     colMap.type   = ci;
          else if (s === 'emetteur' || s === '脙漏metteur')             colMap.emetteur = ci;
          else if (s === 'niveau')                                   colMap.niveau = ci;
          else if (s.includes('n脗掳') && (s.includes('doc') || s.includes('document'))) colMap.numDoc = ci;
          else if (s.includes('titre du document'))                  colMap.title  = ci;
          else if (s.includes('date') || s.includes('pr脙漏visionnelle') || s.includes('previsionnelle')) colMap.date = ci;
          else if (s.includes('observation'))                        colMap.obs    = ci;
          else if (s.includes('equivalent') || s.includes('脙漏quivalent') || s === '芒聜卢' || s.includes('montant')) colMap.equiv  = ci;
        });
        break;
      }
    }

    if (hdrIdx < 0 || colMap.title === undefined) return [];

    const get = (row, key) => (colMap[key] !== undefined ? row[colMap[key]] : null);
    const fmt = (v) => (v ? String(v).trim() : '');

    const parsed = [];
    for (let i = hdrIdx + 1; i < raw.length; i++) {
      const row = raw[i] || [];
      const title = fmt(get(row, 'title'));
      if (!title) continue;
      // Ignorer les lignes de section (< 3 valeurs non-nulles)
      if (row.filter((v) => v !== null && v !== undefined && String(v).trim() !== '').length < 3) continue;

      // D脙漏tecter la date (format ISO ou Excel serial)
      let deadline = '';
      const dateRaw = get(row, 'date');
      if (dateRaw) {
        const s = String(dateRaw);
        const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (m) deadline = `${m[1]}-${m[2]}-${m[3]}`;
      }

      const phase  = fmt(get(row, 'phase'));
      const lot    = fmt(get(row, 'lot'));
      const niveau = fmt(get(row, 'niveau'));
      const numDoc = fmt(get(row, 'numDoc'));
      const obs    = fmt(get(row, 'obs'));

      const descParts = [];
      if (niveau) descParts.push(`Niveau : ${niveau}`);
      if (numDoc) descParts.push(`R脙漏f. : ${numDoc}`);
      if (obs)    descParts.push(obs);

      const equivRaw = fmt(get(row, 'equiv'));
      const revenueAmount = equivRaw ? (parseFloat(equivRaw.replace(/[^\d.,]/g, '').replace(',', '.')) || 0) : 0;

      parsed.push({
        id:            genId(),
        title,
        project:       [phase, lot].filter(Boolean).join(' 芒聙聰 '),
        description:   descParts.join('\n'),
        priority:      'medium',
        column:        'todo',
        deadline,
        estimatedHours: '',
        timerSeconds:   0,
        timerRunning:   false,
        timerStartedAt: null,
        createdAt:      new Date().toISOString(),
        revenueAmount,
        _lot:           lot,
      });
    }
    return parsed;
  };

  // 芒聰聙芒聰聙 Charger un fichier 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  const loadFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      wbRef.current = wb;
      setSheetNames(wb.SheetNames);
      const first = wb.SheetNames[0];
      setSelectedSheet(first);
      applySheet(wb, first);
    };
    reader.readAsArrayBuffer(file);
  };

  const applySheet = (wb, name) => {
    const parsed = parseSheet(wb, name);
    setTasks(parsed);
    const uniqueLots = [...new Set(parsed.map((t) => t._lot).filter(Boolean))];
    setLots(uniqueLots);
    setLotAssign(Object.fromEntries(uniqueLots.map((l) => [l, ''])));
    setStep('preview');
  };

  const changeSheet = (name) => {
    setSelectedSheet(name);
    applySheet(wbRef.current, name);
  };

// 芒聰聙芒聰聙芒聰聙 Board 芒聰聙芒聰聙芒聰聙
function Board({ name, tasks, onUpdate, ro, showName, onToggleTimer, tick, poleMembers, onReassign, onPrioritize, prioritizing }) {
  const [modal, setModal] = useState(null);

  const del = (id) => { onUpdate(name, tasks.filter((t) => t.id !== id)); setModal(null); };
  const drop = (tid, nc) => { onUpdate(name, tasks.map((t) => t.id === tid ? { ...t, column: nc } : t)); };
  const dup = (t) => {
    const copy = { ...t, id: genId(), title: t.title + " (copie)", timerSeconds: 0, timerRunning: false, timerStartedAt: null, createdAt: new Date().toISOString() };
    onUpdate(name, [...tasks, copy]);
  };

  const save = (t) => {
    const target = t.assignedTo && t.assignedTo !== name ? t.assignedTo : null;
    const { assignedTo, ...rest } = t;
    const clean = { ...rest, id: rest.id || genId(), createdAt: rest.createdAt || new Date().toISOString() };
    if (target && onReassign) {
      onReassign(name, target, clean);
    } else {
      const ex = tasks.find((x) => x.id === clean.id);
      onUpdate(name, ex ? tasks.map((x) => x.id === clean.id ? clean : x) : [...tasks, clean]);
    }
    setModal(null);
  };

  const reassignDirect = (task, toName) => {
    if (onReassign) onReassign(name, toName, { ...task, assignedTo: undefined });
  };

  const emptyTask = { title: "", project: "", description: "", priority: "medium", deadline: "", estimatedHours: "", timerSeconds: 0, timerRunning: false, timerStartedAt: null, assignedTo: "" };

  return (
    <div>
      {showName && (
        <div style={{ padding: "10px 16px", marginBottom: 8, borderRadius: 10, background: DARK2, border: "1px solid " + BRD, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <div style={{ width: 32, height: 32, borderRadius: 99, background: BLUE + "22", display: "flex", alignItems: "center", justifyContent: "center", color: BLUE, fontSize: 11, fontWeight: 800, flexShrink: 0 }}>{name.split(" ").map((n) => n[0]).join("").slice(0, 2)}</div>
          <span style={{ color: TXT, fontWeight: 700, fontSize: 14 }}>{name}</span>
          <span style={{ color: TXT3, fontSize: 12 }}>芒聙聰 {tasks.length} t脙垄che{tasks.length !== 1 ? "s" : ""}</span>
          {tasks.some((t) => t.timerRunning) && <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 99, background: CYAN + "22", color: CYAN, fontWeight: 700, animation: "pulse 1.5s infinite" }}>芒聫卤 En cours</span>}
          {onPrioritize && (
            <button
              onClick={() => onPrioritize(name)}
              disabled={prioritizing === name}
              style={{ marginLeft: "auto", padding: "5px 12px", background: prioritizing === name ? TXT3 : PURPLE + "22", border: "1px solid " + (prioritizing === name ? TXT3 : PURPLE + "66"), borderRadius: 7, color: prioritizing === name ? TXT3 : PURPLE, fontSize: 11, fontWeight: 700, cursor: prioritizing === name ? "not-allowed" : "pointer", display: "flex", alignItems: "center", gap: 5 }}>
              {prioritizing === name ? "芒聫鲁 Priorisation..." : "冒聼陇聳 Prioriser"}
            </button>
          )}
        </div>
      )}
      <div style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 8 }}>
        {COLS.map((c) => (
          <KCol key={c.id} col={c} tasks={tasks} owner={name}
            onAdd={(cid) => setModal({ ...emptyTask, column: cid })}
            onEdit={(t) => setModal({ ...t, assignedTo: "" })}
            onDrop={drop} ro={ro}
            onTimerToggle={(tid) => onToggleTimer(name, tid)}
            onDuplicate={dup}
            onReassignDirect={reassignDirect}
            poleMembers={poleMembers}
            tick={tick}
          />
        ))}
      </div>
      {modal && (
        <Modal
          task={modal.id ? modal : modal}
          onSave={save}
          onClose={() => setModal(null)}
          onDelete={modal.id ? del : undefined}
          poleMembers={modal.id ? poleMembers : null}
        />
      )}
    </div>
  );
}

  useEffect(() => {

      const hasRunning = Object.values(current).some((tasks) => tasks.some((t) => t.timerRunning));

        const next = {};

          const updated = tasks.map((t) => {
            if (!t.timerRunning) return t;
            const elapsed = t.timerStartedAt ? Math.floor((now - t.timerStartedAt) / 1000) : 0;

          saveTasks(name, updated);
          next[name] = updated;
        });
        return next;

      {fixedCostsOpen && user.isAdmin && <FixedCostsModal onClose={() => setFixedCostsOpen(false)} />}
      {importModal && (user.isAdmin || user.isChef) && <ImportExcelModal employees={empList} allTasks={all} onImport={handleImport} onClose={() => setImportModal(false)} />}
      {workloadOpen && <WorkloadModal onClose={() => setWorkloadOpen(false)} />}
      {reportOpen && <ReportModal onClose={() => setReportOpen(false)} />}
      {chatOpen && <AIChatPanel user={user} onClose={() => setChatOpen(false)} onAction={refetchAll} />}
      {prioritizeMsg && <PrioritizeToast name={prioritizeMsg.name} msg={prioritizeMsg.msg} onClose={() => setPrioritizeMsg(null)} />}
      {inactivityPaused && (
        <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: DARK2, border: "1px solid " + ORANGE + "66", borderLeft: "4px solid " + ORANGE, borderRadius: 12, padding: "12px 20px", zIndex: 4000, boxShadow: "0 8px 32px rgba(0,0,0,0.5)", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>芒聫赂</span>
          <div>
            <div style={{ color: ORANGE, fontSize: 12, fontWeight: 700 }}>Timer mis en pause</div>
            <div style={{ color: TXT2, fontSize: 11 }}>Inactivit脙漏 d脙漏tect脙漏e depuis 5 minutes</div>
          </div>
        </div>
      )}}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
